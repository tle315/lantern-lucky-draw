<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PandaGoldenEar Lucky Draw</title>

<style>
:root{
  --bg:#fbf6ee;
  --card:#ffffff;
  --ink:#111;
  --muted:#6f6f6f;
  --brand:#8b3a2f;
  --good:#2f7d4a;
  --line:#e8dccb;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial;
  background: radial-gradient(1200px 600px at 50% 0%, #fff 0%, var(--bg) 55%);
  color:var(--ink);
}
.wrap{
  max-width:760px;
  margin:20px auto;
  padding:18px;
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:30px;
  padding:22px;
  box-shadow:0 20px 60px rgba(0,0,0,.06);
  text-align:center;
}

.fu{
  width:64px;height:64px;
  margin:0 auto 10px;
  display:grid;place-items:center;
  border-radius:18px;
  background:linear-gradient(180deg,#c44a3f,#7b261f);
  color:#f3d07a;
  font-weight:900;
  font-size:32px;
}

h1{
  margin:10px 0;
  font-size:clamp(32px,6vw,56px);
  line-height:1.05;
}

.sub{
  color:var(--muted);
  font-size:18px;
  margin-bottom:18px;
}

.followBtn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:14px;
  border-radius:999px;
  border:2px solid var(--line);
  font-weight:900;
  font-size:18px;
  text-decoration:none;
  color:#111;
  margin-bottom:16px;
  background:#fff;
}
.followBtn:active{transform:scale(.98)}

.spinBtn{
  width:100%;
  padding:18px;
  border-radius:26px;
  border:none;
  font-size:24px;
  font-weight:900;
  background:#d6b7b2;
  color:#fff;
}
.spinBtn.active{
  background:linear-gradient(180deg,#b38f89,var(--brand));
}
.spinBtn:disabled{
  opacity:.6;
}

.result{
  margin-top:18px;
  padding:18px;
  border-radius:24px;
  border:1px solid var(--line);
  display:none;
}
.result h2{
  margin:0;
  font-size:clamp(26px,6vw,42px);
  color:var(--brand);
}
.note{
  margin-top:8px;
  color:var(--muted);
}

.footer{
  margin-top:16px;
  color:#777;
  font-weight:600;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="card">
    <div class="fu">福</div>
    <h1>PandaGoldenEar<br/>Lucky Draw</h1>
    <div class="sub">Follow us on Instagram to unlock your spin.</div>

    <!-- Instagram Only -->
    <a class="followBtn" id="igBtn"
       href="https://www.instagram.com/pandagoldenear/"
       target="_blank"
       rel="noopener noreferrer">
       📸 Instagram
    </a>

    <button class="spinBtn" id="spinBtn" disabled>🎉 Spin</button>

    <div class="result" id="resultBox">
      <h2 id="resultTitle"></h2>
      <div class="note" id="resultNote"></div>
    </div>

    <div class="footer">Thanks for joining — see you at the dumpling stall!</div>
  </div>
</div>

<script>
const POOL_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR1Of71IvsS43kx9oDtQjWMeQDCNFHBw9FQ83YX6VFA2-iS7hOKYRyvrGkGYfsnCirFyzoO8oWe6vZk/pub?gid=0&single=true&output=csv";
const BLESS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR1Of71IvsS43kx9oDtQjWMeQDCNFHBw9FQ83YX6VFA2-iS7hOKYRyvrGkGYfsnCirFyzoO8oWe6vZk/pub?gid=931297523&single=true&output=csv";

const KEY_UNLOCK="pge_unlock_v2";
const KEY_PLAY="pge_play_v2";

const spinBtn=document.getElementById("spinBtn");
const resultBox=document.getElementById("resultBox");
const resultTitle=document.getElementById("resultTitle");
const resultNote=document.getElementById("resultNote");

function unlocked(){return localStorage.getItem(KEY_UNLOCK)==="1";}
function played(){return localStorage.getItem(KEY_PLAY)==="1";}

document.getElementById("igBtn").addEventListener("click",()=>{
  localStorage.setItem(KEY_UNLOCK,"1");
  render();
});

function render(){
  if(unlocked() && !played()){
    spinBtn.disabled=false;
    spinBtn.classList.add("active");
  }else{
    spinBtn.disabled=true;
  }
}
render();

async function loadCSV(url){
  const res=await fetch(url+"&t="+Date.now());
  const text=await res.text();
  const rows=text.trim().split("\n").map(r=>r.split(","));
  const header=rows.shift();
  return rows.map(r=>{
    const obj={};
    header.forEach((h,i)=>obj[h.trim()]=r[i]);
    return obj;
  });
}

function weightedPick(arr){
  const total=arr.reduce((s,x)=>s+Number(x.weight||0),0);
  let r=Math.random()*total;
  for(const it of arr){
    r-=Number(it.weight||0);
    if(r<=0)return it;
  }
  return arr[0];
}

spinBtn.addEventListener("click",async()=>{
  if(spinBtn.disabled)return;

  const pool=await loadCSV(POOL_URL);
  const blessings=await loadCSV(BLESS_URL);

  const active=pool.filter(p=>p.active_auto==="TRUE" && Number(p.remaining_auto)>0);

  let pick;
  if(!active.length){
    pick=weightedPick(blessings);
    resultTitle.textContent=pick.blessing;
    resultNote.textContent="";
  }else{
    pick=weightedPick(active);
    if((pick.type||"").toLowerCase()==="blessing"){
      const b=weightedPick(blessings);
      resultTitle.textContent=b.blessing;
      resultNote.textContent="";
    }else{
      resultTitle.textContent=pick.prize;
      resultNote.textContent="Show this screen to our staff to claim.";
    }
  }

  localStorage.setItem(KEY_PLAY,"1");
  resultBox.style.display="block";
  render();
});
</script>
</body>
</html>
