<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PandaGoldenEar Lucky Draw</title>
</head>
<body style="font-family:system-ui;background:#f6f1e8;text-align:center;padding:40px">

<h1>🧧 PandaGoldenEar Lucky Draw</h1>
<p>Tap to reveal your surprise.</p>

<button onclick="spin()" style="padding:15px 25px;font-size:18px;border-radius:8px;background:#b53a34;color:white;border:none;">
🎉 Spin
</button>

<h2 id="result" style="margin-top:30px;"></h2>

<script>
const SHEET_ID = "128d4NCaWKKlZF9RnPB-VmsmbTXSdejuRAM8PCE1B1Ds";
const POOL = "pool";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${POOL}`;

async function spin(){
  const res = await fetch(CSV_URL);
  const text = await res.text();

  const rows = text.split("\n").map(r=>r.split(","));
  const header = rows[0];

  const prizeIndex = header.indexOf("prize");
  const weightIndex = header.indexOf("weight");
  const activeIndex = header.indexOf("active_auto");
  const remainingIndex = header.indexOf("remaining_auto");

  const items = rows.slice(1).map(r=>({
    prize:r[prizeIndex],
    weight:parseInt(r[weightIndex])||0,
    active:r[activeIndex]==="TRUE",
    remaining:parseInt(r[remainingIndex])||0
  })).filter(x=>x.active && x.remaining>0);

  let total = items.reduce((a,b)=>a+b.weight,0);
  let rand = Math.random()*total;

  for(let item of items){
    rand -= item.weight;
    if(rand<=0){
      document.getElementById("result").innerText = item.prize;
      return;
    }
  }

  document.getElementById("result").innerText = "Good luck is coming your way :)";
}
</script>

</body>
</html>
