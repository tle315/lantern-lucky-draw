<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PandaGoldenEar Lucky Draw</title>
  <style>
    :root{
      --bg:#f6efe7;
      --card:#fff7ef;
      --ink:#2b2b2b;
      --muted:#6f6a64;
      --line:#e8dccf;
      --accent:#b46b52;
    }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: var(--bg);
      color: var(--ink);
    }
    .wrap{
      max-width: 520px;
      margin: 0 auto;
      padding: 18px 16px 28px;
    }
    .top{
      display:flex; align-items:center; gap:10px;
      margin-top: 8px;
    }
    .fu{
      width:40px;height:40px;border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      background: #a64a3a;
      color:#ffd56a;
      font-weight:800;
      box-shadow: 0 6px 18px rgba(0,0,0,.08);
      user-select:none;
    }
    h1{ margin:0; font-size: 26px; letter-spacing:.2px; }
    .sub{ margin:6px 0 14px; color:var(--muted); font-size: 14px; }

    .follow{
      border:1px dashed var(--line);
      background: rgba(255,255,255,.35);
      border-radius:16px;
      padding:12px;
      text-align:center;
    }
    .follow .btns{ display:flex; gap:10px; justify-content:center; margin-top:8px; flex-wrap:wrap;}
    .pill{
      padding:9px 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--ink);
      text-decoration:none;
      font-weight:600;
      font-size:14px;
    }

    .wheelBox{
      margin-top:16px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }
    .pointer{
      width:0;height:0;
      border-left:12px solid transparent;
      border-right:12px solid transparent;
      border-bottom:18px solid #7a3b2d;
      margin-bottom:-6px;
    }
    canvas{
      background: #fff;
      border-radius: 50%;
      border: 10px solid rgba(255,255,255,.7);
      box-shadow: 0 10px 30px rgba(0,0,0,.12);
    }
    .spinBtn{
      width: 220px;
      padding: 12px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--accent);
      color: white;
      font-weight: 800;
      font-size: 16px;
      cursor:pointer;
      box-shadow: 0 10px 22px rgba(180,107,82,.28);
    }
    .spinBtn:disabled{ opacity:.6; cursor:not-allowed; }
    .hint{
      color:var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }

    .result{
      margin-top: 16px;
      border:1px solid var(--line);
      background: var(--card);
      border-radius: 18px;
      padding: 14px;
    }
    .badge{
      display:inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      border:1px solid var(--line);
      background:#fff;
      font-weight:800;
      font-size: 13px;
      color: var(--accent);
    }
    .got{ margin-top:10px; color:var(--muted); font-weight:700; letter-spacing:.4px; font-size: 12px;}
    .big{
      font-size: 28px;
      font-weight: 900;
      margin-top: 6px;
      line-height: 1.12;
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="fu">福</div>
    <div>
      <h1>PandaGoldenEar Lucky Draw</h1>
      <div class="sub">Tap Spin to reveal your surprise.</div>
    </div>
  </div>

  <div class="follow">
    💥 Don’t forget to follow us —
    <div class="btns">
      <a class="pill" href="#" id="ig">Instagram</a>
      <a class="pill" href="#" id="fb">Facebook</a>
      <a class="pill" href="#" id="tt">TikTok</a>
    </div>
    <div class="sub" style="margin:10px 0 0;">Follow any ONE platform to stay updated 😉</div>
  </div>

  <div class="wheelBox">
    <div class="pointer"></div>
    <canvas id="wheel" width="320" height="320"></canvas>
    <button class="spinBtn" id="spin">Spin</button>
    <div class="hint">Thanks! One play per device.</div>
  </div>

  <div class="result" id="result" style="display:none;">
    <div class="badge" id="badge">PRIZE</div>
    <div class="got">YOU GOT</div>
    <div class="big" id="bigText"></div>
  </div>

</div>

<script>
  // 1) Fill these:
  const SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE"; // e.g. https://script.google.com/macros/s/XXXX/exec

  // Social links (optional)
  document.getElementById('ig').href = "https://instagram.com/";
  document.getElementById('fb').href = "https://facebook.com/";
  document.getElementById('tt').href = "https://tiktok.com/";

  // 2) Device id (one play per device)
  const DEVICE_KEY = "pge_lucky_device_id";
  function getDeviceId(){
    let v = localStorage.getItem(DEVICE_KEY);
    if(!v){
      v = "dev_" + Math.random().toString(36).slice(2,10) + Date.now().toString(36);
      localStorage.setItem(DEVICE_KEY, v);
    }
    return v;
  }

  // 3) Wheel segments (match your pool order; MVP hardcode)
  // You can later swap to "config" call and build dynamically.
  const segments = [
    "Blessing",
    "This is on us",
    "50% off for your next order",
    "2 more Dumplings",
    "One More Drink"
  ];

  // Drawing wheel
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const cx = canvas.width/2, cy = canvas.height/2;
  const radius = canvas.width/2 - 12;

  function drawWheel(rotation=0){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const n = segments.length;
    const arc = (Math.PI*2)/n;

    for(let i=0;i<n;i++){
      const start = rotation + i*arc;
      const end = start + arc;

      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,radius,start,end);
      ctx.closePath();
      ctx.fillStyle = i%2===0 ? "rgba(180,107,82,.10)" : "rgba(255,255,255,.9)";
      ctx.fill();
      ctx.strokeStyle = "rgba(232,220,207,.9)";
      ctx.stroke();

      // text
      ctx.save();
      ctx.translate(cx,cy);
      ctx.rotate(start + arc/2);
      ctx.textAlign = "right";
      ctx.fillStyle = "#6b5248";
      ctx.font = "600 13px system-ui";
      ctx.fillText(segments[i], radius - 14, 5);
      ctx.restore();
    }

    // center button look
    ctx.beginPath();
    ctx.arc(cx,cy,68,0,Math.PI*2);
    ctx.fillStyle = "rgba(180,107,82,.25)";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx,cy,48,0,Math.PI*2);
    ctx.fillStyle = "rgba(180,107,82,.35)";
    ctx.fill();

    ctx.fillStyle="#fff";
    ctx.font="900 20px system-ui";
    ctx.textAlign="center";
    ctx.fillText("Spin", cx, cy+7);

    ctx.fillStyle="rgba(255,255,255,.85)";
    ctx.font="700 12px system-ui";
    ctx.fillText("tap to spin", cx, cy+30);
  }

  let currentRotation = -Math.PI/2; // so pointer is at top
  drawWheel(currentRotation);

  // 4) JSONP helper
  function jsonp(url, cbName){
    return new Promise((resolve, reject) => {
      const callback = cbName || ("cb_" + Math.random().toString(36).slice(2));
      window[callback] = (data) => {
        resolve(data);
        try { delete window[callback]; } catch(e){}
        script.remove();
      };
      const script = document.createElement('script');
      script.src = url + (url.includes('?') ? '&' : '?') + "callback=" + callback + "&t=" + Date.now();
      script.onerror = reject;
      document.body.appendChild(script);
    });
  }

  // 5) Spin flow: call backend -> animate to landed segment
  const btn = document.getElementById('spin');
  const resultBox = document.getElementById('result');
  const badge = document.getElementById('badge');
  const bigText = document.getElementById('bigText');

  function showResult(type, text){
    resultBox.style.display = 'block';
    badge.textContent = type.toUpperCase();
    bigText.textContent = text;
  }

  function indexOfPrize(prize){
    const i = segments.findIndex(s => s.toLowerCase() === String(prize).toLowerCase());
    return i >= 0 ? i : 0;
  }

  btn.addEventListener('click', async () => {
    btn.disabled = true;

    const deviceId = getDeviceId();
    const url = `${SCRIPT_URL}?action=spin&device_id=${encodeURIComponent(deviceId)}`;

    let data;
    try{
      data = await jsonp(url);
    }catch(e){
      btn.disabled = false;
      showResult("error", "Network error. Try again.");
      return;
    }

    if(!data.ok){
      btn.disabled = false;
      showResult("error", data.error || "Unknown error");
      return;
    }

    if(data.alreadyPlayed){
      btn.disabled = false;
      showResult("info", "You already played on this device 🙂");
      return;
    }

    const prize = data.prize || "Blessing";
    const landIndex = indexOfPrize(prize);

    // animate rotation to landIndex at pointer (top)
    const n = segments.length;
    const arc = (Math.PI*2)/n;

    // target angle: make segment center align to -PI/2 (top)
    const target = -Math.PI/2 - (landIndex*arc + arc/2);

    // add spins
    const spins = 6 * Math.PI*2;
    const startRot = currentRotation;
    const endRot = target - spins;

    const duration = 3800;
    const startTime = performance.now();

    function easeOutCubic(t){ return 1 - Math.pow(1-t, 3); }

    function anim(now){
      const t = Math.min(1, (now - startTime)/duration);
      const k = easeOutCubic(t);
      currentRotation = startRot + (endRot - startRot) * k;
      drawWheel(currentRotation);

      if(t < 1) requestAnimationFrame(anim);
      else{
        // show result: blessing text if blessing
        const isBlessing = String(prize).toLowerCase() === 'blessing';
        const text = isBlessing ? (data.blessingText || "Good luck!") : prize;
        showResult(isBlessing ? "blessing ✨" : "prize 🎉", text);
        btn.disabled = false;
      }
    }
    requestAnimationFrame(anim);
  });
</script>
</body>
</html>
