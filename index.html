<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PandaGoldenEar Lucky Draw</title>
  <style>
    :root{
      --bg1:#f7efe4;
      --bg2:#f3e7d8;
      --card:#fff8ef;
      --ink:#141414;
      --muted:#6b6257;
      --line:#e6d8c8;
      --dash:#d9c9b6;
      --brand:#b89484;
      --brand2:#8f6f61;
      --success:#2e7d32;
      --shadow: 0 18px 50px rgba(0,0,0,.08);
      --shadow2: 0 10px 24px rgba(0,0,0,.06);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--ink);
      background: radial-gradient(1200px 700px at 50% -10%, #fff7ec 20%, var(--bg1) 60%, var(--bg2) 100%);
    }
    .wrap{
      width:min(980px, 100%);
      margin:0 auto;
      padding: 18px 14px 32px;
    }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.82), rgba(255,255,255,.62));
      border:1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 18px 18px 22px;
      position:relative;
      overflow:hidden;
    }
    .top-pill{
      width: fit-content;
      margin: 2px auto 12px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #fff1d6, #f2e0bf);
      color:#5a4b37;
      font-weight: 700;
      letter-spacing:.2px;
      display:flex;
      align-items:center;
      gap:10px;
      box-shadow: var(--shadow2);
    }
    .title-row{
      display:flex;
      gap:14px;
      align-items:flex-start;
      justify-content:center;
      padding: 10px 0 6px;
    }
    .fu{
      width:56px;height:56px;
      border-radius: 16px;
      background: radial-gradient(circle at 30% 25%, #cf5a45, #8c2c24 70%);
      display:grid;place-items:center;
      color:#f5d08a;
      font-weight:900;
      font-size: 30px;
      box-shadow: 0 16px 26px rgba(140,44,36,.22);
      flex: 0 0 auto;
      user-select:none;
    }
    h1{
      margin:0;
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1.02;
      letter-spacing:-.9px;
      text-align:left;
      user-select:none;
    }
    .sub{
      text-align:center;
      color: var(--muted);
      margin: 6px 0 14px;
      font-size: 18px;
      font-weight: 600;
    }

    .follow-box{
      margin: 0 auto 18px;
      max-width: 860px;
      border: 2px dashed var(--dash);
      border-radius: 20px;
      background: rgba(255,248,239,.55);
      padding: 14px 14px 12px;
      text-align:center;
    }
    .follow-top{
      font-weight: 800;
      color:#5a4b37;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom: 8px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color:#6a543f;
      font-weight: 800;
      text-decoration:none;
      box-shadow: 0 8px 18px rgba(0,0,0,.05);
    }
    .follow-note{
      color: var(--muted);
      font-weight: 650;
      margin-top: 2px;
    }

    .stage{
      display:grid;
      grid-template-columns: 1fr;
      place-items:center;
      gap: 10px;
    }

    .wheel-shell{
      position:relative;
      width: min(560px, 92vw);
      aspect-ratio: 1/1;
      margin: 2px auto 6px;
      filter: drop-shadow(0 24px 36px rgba(0,0,0,.10));
      user-select:none;
    }
    .pointer{
      position:absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width:0;height:0;
      border-left: 18px solid transparent;
      border-right:18px solid transparent;
      border-bottom: 28px solid #6c3b2e;
      filter: drop-shadow(0 8px 8px rgba(0,0,0,.12));
      z-index: 3;
    }

    /* rotating layer */
    .wheel-rotor{
      position:absolute;
      inset: 0;
      transform: rotate(0deg);
      will-change: transform;
    }

    /* center button (smaller so it never covers text on arcs) */
    .spin-btn{
      position:absolute;
      left:50%; top:50%;
      transform: translate(-50%,-50%);
      width: 130px; height:130px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.7);
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.8), rgba(184,148,132,.72));
      box-shadow: 0 18px 40px rgba(0,0,0,.16);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-weight: 900;
      font-size: 26px;
      color:#fff;
      cursor:pointer;
      z-index: 4;
      backdrop-filter: blur(4px);
      transition: transform .16s ease;
      text-shadow: 0 1px 0 rgba(0,0,0,.18);
    }
    .spin-btn:active{ transform: translate(-50%,-50%) scale(.97); }
    .spin-btn.bounce{
      animation: btnBounce .22s ease;
    }
    @keyframes btnBounce{
      0%{ transform: translate(-50%,-50%) scale(1); }
      50%{ transform: translate(-50%,-50%) scale(1.06); }
      100%{ transform: translate(-50%,-50%) scale(1); }
    }
    .spin-btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
    }

    .status{
      text-align:center;
      font-weight: 800;
      color:#6a543f;
      margin: 6px 0 10px;
    }
    .status.good{
      color: var(--success);
    }

    .result{
      width: min(860px, 100%);
      margin: 6px auto 0;
      background: rgba(255,255,255,.58);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px 16px 18px;
      box-shadow: var(--shadow2);
      position:relative;
      overflow:hidden;
    }
    .result-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom: 10px;
    }
    .tag{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(240,255,244,.85);
      color:#246b2a;
      font-weight: 900;
    }
    .tag.muted{
      background: rgba(255,255,255,.70);
      color:#6a543f;
      font-weight: 850;
    }
    .yougot{
      text-align:center;
      letter-spacing: .48em;
      font-weight: 900;
      color:#6d6258;
      margin: 8px 0 6px;
    }
    .big{
      text-align:center;
      font-size: clamp(34px, 6vw, 56px);
      margin: 0 0 6px;
      font-weight: 950;
      line-height: 1.05;
    }
    .small{
      text-align:center;
      color: var(--muted);
      font-weight: 650;
      font-size: 18px;
      margin-top: 6px;
    }

    /* gold sparkle for PRIZE */
    .sparkle{
      pointer-events:none;
      position:absolute;
      inset:-40px;
      opacity:0;
    }
    .sparkle.on{
      opacity:1;
      animation: shimmer 1.4s ease-in-out forwards;
    }
    @keyframes shimmer{
      0%{ transform: translateX(-30%); opacity:0; }
      15%{ opacity:1; }
      60%{ opacity:1; }
      100%{ transform: translateX(30%); opacity:0; }
    }

    .footer{
      text-align:center;
      color:#7a6e63;
      font-weight: 700;
      margin-top: 10px;
      font-size: 18px;
    }

    @media (max-width: 430px){
      .spin-btn{ width: 118px; height:118px; font-size: 24px; }
      .follow-box{ padding: 12px 12px 10px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top-pill">🏮 <span>Lantern Festival Special</span></div>

      <div class="title-row">
        <div class="fu">福</div>
        <!-- 长按这个标题进入 reset -->
        <h1 id="pageTitle">PandaGoldenEar<br/>Lucky Draw</h1>
      </div>

      <div class="sub">Tap <b>Spin</b> to reveal your surprise.</div>

      <div class="follow-box">
        <div class="follow-top">📸 Don’t forget to follow us — 
          <a class="pill" href="https://www.instagram.com/pandagoldenear/" target="_blank" rel="noopener">Instagram</a>
          <a class="pill" href="https://www.facebook.com/pandagoldenear" target="_blank" rel="noopener">Facebook</a>
          <span class="pill" style="pointer-events:none; opacity:.9;">TikTok</span>
        </div>
        <div class="follow-note">Follow any <b>ONE</b> platform to stay updated 😉</div>
      </div>

      <div class="stage">
        <div class="wheel-shell">
          <div class="pointer"></div>

          <div id="wheelRotor" class="wheel-rotor" aria-label="Lucky draw wheel">
            <!-- SVG wheel injected here -->
          </div>

          <button id="spinBtn" class="spin-btn" type="button">🎉 <span>Spin</span></button>
        </div>

        <div id="status" class="status">Loading prizes…</div>

        <div id="resultCard" class="result" style="display:none;">
          <div id="sparkle" class="sparkle">
            <svg width="1200" height="260" viewBox="0 0 1200 260" preserveAspectRatio="none">
              <defs>
                <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0" stop-color="rgba(255,215,128,0)"/>
                  <stop offset=".5" stop-color="rgba(255,215,128,.75)"/>
                  <stop offset="1" stop-color="rgba(255,215,128,0)"/>
                </linearGradient>
              </defs>
              <rect x="-200" y="0" width="1600" height="260" fill="url(#g)"/>
            </svg>
          </div>

          <div class="result-top">
            <div id="tagLeft" class="tag">PRIZE 🎁</div>
            <div id="tagRight" class="tag muted">✅ Played — thanks!</div>
          </div>

          <div class="yougot">YOU GOT</div>
          <div id="bigText" class="big"></div>
          <div id="smallText" class="small"></div>
        </div>

        <div class="footer">Thanks for joining — see you at our dumpling food truck!</div>
      </div>
    </div>
  </div>

<script>
/** =========================
 *  CONFIG
 *  ========================= */
const API_URL = "https://script.google.com/macros/s/AKfycbxk94zQkTeLozqgk4a3fY_TV1LScNDjxU5CRE06ioOEzqUDLkT2-atxWjB4rx2tv38V/exec";
// 如果你后端 action 名不是 pool / spin / health，请按你的实际改这里：
const ACTION_POOL = "pool";
const ACTION_SPIN = "spin";
const ACTION_HEALTH = "health";

const LS_PLAYED_KEY = "pge_lucky_played_v3";
const LS_DEVICE_KEY = "pge_lucky_device_v3";
const LS_STAFF_KEY  = "pge_lucky_staff_v3";

/** =========================
 *  STATE
 *  ========================= */
let pool = [];            // [{row, label, weight, remaining_auto, active}]
let isSpinning = false;
let currentRotation = 0;  // degrees
let wheelSVGSize = 560;

const elRotor = document.getElementById("wheelRotor");
const elSpin  = document.getElementById("spinBtn");
const elStatus = document.getElementById("status");
const elResult = document.getElementById("resultCard");
const elBig = document.getElementById("bigText");
const elSmall = document.getElementById("smallText");
const elSparkle = document.getElementById("sparkle");
const elTagLeft = document.getElementById("tagLeft");

/** =========================
 *  UTIL
 *  ========================= */
function uid() {
  const t = Date.now().toString(36);
  const r = Math.random().toString(36).slice(2,10);
  return `${t}-${r}`;
}
function getDeviceId(){
  let id = localStorage.getItem(LS_DEVICE_KEY);
  if(!id){ id = uid(); localStorage.setItem(LS_DEVICE_KEY, id); }
  return id;
}
function setPlayed(v){
  if(v) localStorage.setItem(LS_PLAYED_KEY, "1");
  else localStorage.removeItem(LS_PLAYED_KEY);
}
function isPlayed(){
  return localStorage.getItem(LS_PLAYED_KEY) === "1";
}
function degToRad(d){ return d * Math.PI / 180; }
function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }

function setStatus(text, good=false){
  elStatus.textContent = text;
  elStatus.className = "status" + (good ? " good" : "");
}
function safeText(s){
  return String(s ?? "").replace(/\s+/g," ").trim();
}

/** =========================
 *  FETCH HELPERS
 *  ========================= */
async function apiGet(params){
  const url = new URL(API_URL);
  Object.entries(params).forEach(([k,v])=> url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { method:"GET", cache:"no-store" });
  const txt = await res.text();
  // 兼容后端返回 JSON / text
  try { return JSON.parse(txt); } catch { return { ok:true, raw: txt }; }
}

/** =========================
 *  WHEEL (SVG with arc text)
 *  ========================= */
function buildWheelSVG(items){
  // responsive size
  const size = Math.min(560, Math.floor(window.innerWidth * 0.92));
  wheelSVGSize = size;

  const cx = size/2, cy=size/2;
  const R  = size * 0.47;          // outer radius
  const rInner = size * 0.18;      // inner radius (keeps center clear)
  const ringStroke = size * 0.015;

  const N = Math.max(2, items.length);
  const step = 360 / N;

  const colors = [
    "#f7e7d6","#f2f6ff","#e9f8f1","#fff2d9","#f6e9ff","#ffe9ee"
  ];

  // helpers to create arc path
  function polarToXY(rad, radius){
    return [cx + Math.cos(rad)*radius, cy + Math.sin(rad)*radius];
  }
  function arcPath(startDeg, endDeg, radius){
    const start = degToRad(startDeg - 90);
    const end   = degToRad(endDeg - 90);
    const [x1,y1]=polarToXY(start, radius);
    const [x2,y2]=polarToXY(end, radius);
    const large = (endDeg-startDeg) > 180 ? 1 : 0;
    return `M ${x1} ${y1} A ${radius} ${radius} 0 ${large} 1 ${x2} ${y2}`;
  }
  function wedgePath(startDeg, endDeg){
    const a1 = degToRad(startDeg - 90);
    const a2 = degToRad(endDeg   - 90);
    const [ox1,oy1]=polarToXY(a1, R);
    const [ox2,oy2]=polarToXY(a2, R);
    const [ix2,iy2]=polarToXY(a2, rInner);
    const [ix1,iy1]=polarToXY(a1, rInner);
    const large = (endDeg-startDeg) > 180 ? 1 : 0;
    return [
      `M ${ix1} ${iy1}`,
      `L ${ox1} ${oy1}`,
      `A ${R} ${R} 0 ${large} 1 ${ox2} ${oy2}`,
      `L ${ix2} ${iy2}`,
      `A ${rInner} ${rInner} 0 ${large} 0 ${ix1} ${iy1}`,
      "Z"
    ].join(" ");
  }

  const svgParts = [];
  svgParts.push(`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" aria-hidden="true">`);

  // outer ring
  svgParts.push(`<circle cx="${cx}" cy="${cy}" r="${R}" fill="rgba(255,255,255,.60)" stroke="#e6d8c8" stroke-width="${ringStroke}"/>`);
  svgParts.push(`<circle cx="${cx}" cy="${cy}" r="${rInner}" fill="rgba(255,255,255,.65)" stroke="#e6d8c8" stroke-width="${ringStroke}"/>`);

  // defs for arc text paths
  svgParts.push(`<defs>`);
  for(let i=0;i<N;i++){
    const start = i*step;
    const end   = (i+1)*step;
    // place text on an arc slightly inside outer edge so it never touches the center button
    const textRadius = R * 0.80;
    const p = arcPath(start+8, end-8, textRadius);
    svgParts.push(`<path id="arc-${i}" d="${p}" />`);
  }
  svgParts.push(`</defs>`);

  // wedges + labels
  for(let i=0;i<N;i++){
    const start = i*step;
    const end   = (i+1)*step;
    const fill  = colors[i % colors.length];
    const label = safeText(items[i]?.label || `Item ${i+1}`);

    svgParts.push(`<path d="${wedgePath(start,end)}" fill="${fill}" stroke="#e6d8c8" stroke-width="${ringStroke*0.9}"/>`);

    // Arc label (horizontal along curve)
    // Use startOffset=50% to center the text along arc.
    const fontSize = clamp(size * 0.045, 14, 22);
    svgParts.push(`
      <text fill="#5a4b37" font-weight="800" font-size="${fontSize}" letter-spacing=".2px">
        <textPath href="#arc-${i}" startOffset="50%" text-anchor="middle">
          ${escapeHtml(label)}
        </textPath>
      </text>
    `);
  }

  // subtle inner shading
  svgParts.push(`<circle cx="${cx}" cy="${cy}" r="${R*0.62}" fill="rgba(255,255,255,.10)"/>`);

  svgParts.push(`</svg>`);
  return svgParts.join("");
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[m]));
}

/** =========================
 *  SPIN LOGIC
 *  Uses backend pool_row to land precisely
 *  ========================= */
function segmentCenterAngle(index, total){
  // pointer is at 0deg (top). Our wheel starts at 0deg.
  const step = 360 / total;
  return (index * step) + step/2; // degrees, 0 at top
}

function spinToIndex(index){
  const N = pool.length;
  const targetCenter = segmentCenterAngle(index, N);

  // We want the wheel to rotate so that targetCenter lands under pointer at top.
  // If wheel rotates by rot degrees, a segment at angle targetCenter moves to (targetCenter + rot) mod 360.
  // We want (targetCenter + rot) mod 360 === 0  => rot ≡ -targetCenter (mod 360)
  const normalizedTarget = ((-targetCenter) % 360 + 360) % 360;

  // add multiple full spins + deceleration feel
  const extraTurns = 7 + Math.floor(Math.random()*3); // 7~9
  const finalRotation = extraTurns*360 + normalizedTarget;

  // animate
  isSpinning = true;
  elSpin.disabled = true;

  // physical-ish easing
  const duration = 5200; // ms
  elRotor.style.transition = `transform ${duration}ms cubic-bezier(.12,.92,.16,1)`;
  currentRotation += finalRotation;
  elRotor.style.transform = `rotate(${currentRotation}deg)`;

  return new Promise(resolve=>{
    setTimeout(()=>{
      // snap to a clean modulo to avoid huge number drift
      const mod = ((currentRotation % 360) + 360) % 360;
      currentRotation = mod;
      elRotor.style.transition = "none";
      elRotor.style.transform = `rotate(${currentRotation}deg)`;
      // force reflow then allow future transitions
      void elRotor.offsetHeight;
      isSpinning = false;
      elSpin.disabled = false;
      resolve();
    }, duration + 30);
  });
}

/** =========================
 *  UI RESULT
 *  ========================= */
function showResult(payload){
  // payload: {result_type, result_text}
  const type = safeText(payload?.result_type).toLowerCase();
  const text = safeText(payload?.result_text);

  elResult.style.display = "block";
  elBig.textContent = text || "—";

  if(type === "blessing"){
    elTagLeft.textContent = "BLESSING ✨";
    elTagLeft.style.background = "rgba(255,255,255,.70)";
    elTagLeft.style.color = "#6a543f";
    elTagLeft.style.borderColor = "var(--line)";
    elSmall.textContent = "Thanks for playing — see you at our dumpling food truck!";
    // no gold shimmer on blessing
    elSparkle.classList.remove("on");
  }else{
    elTagLeft.textContent = "PRIZE 🎁";
    elTagLeft.style.background = "rgba(240,255,244,.85)";
    elTagLeft.style.color = "#246b2a";
    elSmall.textContent = "If you win a prize, show this screen to our staff to claim.";
    // gold shimmer
    elSparkle.classList.remove("on");
    void elSparkle.offsetHeight;
    elSparkle.classList.add("on");
  }
}

/** =========================
 *  INIT + EVENTS
 *  ========================= */
async function loadPool(){
  setStatus("Loading prizes…");
  try{
    // optional health check
    try{ await apiGet({ action: ACTION_HEALTH, t: Date.now() }); }catch(e){}

    const data = await apiGet({ action: ACTION_POOL, t: Date.now() });

    // Expect backend to return: { ok:true, pool:[{row,label,weight,remaining_auto,active}] }
    // Fallback if returned as array.
    const list = Array.isArray(data?.pool) ? data.pool : (Array.isArray(data) ? data : null);
    if(!list || !list.length){
      console.log("POOL raw:", data);
      setStatus("Pool not loaded. Check API response in console.", false);
      return;
    }

    pool = list.map((x, i)=>({
      row: Number(x.row ?? x.pool_row ?? (i+1)),
      label: safeText(x.label ?? x.prize ?? x.prize_text ?? x.name ?? x.text),
      weight: Number(x.weight ?? 1),
      remaining_auto: Number(x.remaining_auto ?? x.remaining ?? x.after_remaining ?? 999999),
      active: (x.active === true || String(x.active).toUpperCase()==="TRUE" || x.active === 1 || x.active === "1")
    }));

    // only active items for drawing display, but wheel should show active items (or all)
    // For your use-case, show ALL active items; if none active, show all.
    const active = pool.filter(p=>p.active !== false);
    if(active.length >= 2) pool = active;

    // render wheel
    elRotor.innerHTML = buildWheelSVG(pool);

    // played state
    if(isPlayed()){
      setStatus("✅ Already played on this device", true);
      elSpin.disabled = true;
    }else{
      setStatus("Ready — tap Spin 🎉", true);
      elSpin.disabled = false;
    }
  }catch(err){
    console.error(err);
    setStatus("Failed to load prizes. Check API URL / permissions.", false);
  }
}

async function doSpin(){
  if(isSpinning) return;
  if(isPlayed()){
    setStatus("✅ Already played on this device", true);
    return;
  }
  if(!pool.length){
    setStatus("Pool not ready yet…", false);
    return;
  }

  elSpin.classList.remove("bounce");
  void elSpin.offsetHeight;
  elSpin.classList.add("bounce");

  setStatus("Spinning…", true);

  try{
    const device_id = getDeviceId();
    const resp = await apiGet({ action: ACTION_SPIN, device_id, t: Date.now() });

    // Expect: { ok:true, pool_row, result_type, result_text }
    if(!resp || resp.ok === false){
      console.log("SPIN raw:", resp);
      setStatus("Spin failed. Check API response.", false);
      return;
    }

    const poolRow = Number(resp.pool_row ?? resp.poolRow ?? resp.row);
    const idx = pool.findIndex(p => p.row === poolRow);

    // If backend didn't return row, fall back to matching by label
    let finalIndex = idx;
    if(finalIndex < 0){
      const txt = safeText(resp.prize ?? resp.result_text ?? resp.resultText);
      finalIndex = pool.findIndex(p => safeText(p.label).toLowerCase() === txt.toLowerCase());
    }
    if(finalIndex < 0) finalIndex = Math.floor(Math.random()*pool.length);

    await spinToIndex(finalIndex);

    // show result (always trust backend text/type)
    showResult({
      result_type: resp.result_type ?? resp.type,
      result_text: resp.result_text ?? resp.text ?? resp.result
    });

    setPlayed(true);
    setStatus("✅ Played — thanks!", true);
    elSpin.disabled = true;

  }catch(err){
    console.error(err);
    setStatus("Spin error (network / CORS / permissions).", false);
  }
}

/** =========================
 *  STAFF RESET: long press title → prompt "reset"
 *  ========================= */
(function staffLongPress(){
  const title = document.getElementById("pageTitle");
  let pressTimer = null;
  let startedAt = 0;

  function start(){
    if(pressTimer) return;
    startedAt = Date.now();
    pressTimer = setTimeout(()=>{
      pressTimer = null;
      const code = prompt("Staff reset: type 'reset' to clear this device.");
      if(String(code).trim().toLowerCase() === "reset"){
        localStorage.removeItem(LS_PLAYED_KEY);
        // keep device id (or clear it if you want new id each reset)
        // localStorage.removeItem(LS_DEVICE_KEY);
        alert("Reset done ✅");
        location.reload();
      }else if(code !== null){
        alert("Cancelled.");
      }
    }, 1200);
  }

  function cancel(){
    if(pressTimer){
      clearTimeout(pressTimer);
      pressTimer = null;
    }
  }

  title.addEventListener("touchstart", start, {passive:true});
  title.addEventListener("touchend", cancel, {passive:true});
  title.addEventListener("touchcancel", cancel, {passive:true});

  title.addEventListener("mousedown", start);
  window.addEventListener("mouseup", cancel);
  title.addEventListener("mouseleave", cancel);
})();

elSpin.addEventListener("click", doSpin);
window.addEventListener("resize", ()=>{
  if(pool.length) elRotor.innerHTML = buildWheelSVG(pool);
});

loadPool();
</script>
