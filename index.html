<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PandaGoldenEar Lucky Draw</title>
  <style>
    :root{
      --bg1:#f7efe4;
      --bg2:#f3e7d8;
      --card:#fff8ef;
      --ink:#141414;
      --muted:#6b6257;
      --line:#e6d8c8;
      --dash:#d9c9b6;
      --brand:#b89484;
      --brand2:#8f6f61;
      --success:#2e7d32;
      --shadow: 0 18px 50px rgba(0,0,0,.08);
      --shadow2: 0 10px 24px rgba(0,0,0,.06);
      --gold: #f2c14e;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--ink);
      background: radial-gradient(1200px 700px at 50% -10%, #fff7ec 20%, var(--bg1) 60%, var(--bg2) 100%);
    }
    .wrap{ width:min(980px, 100%); margin:0 auto; padding: 18px 14px 32px; }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.82), rgba(255,255,255,.62));
      border:1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 18px 18px 22px;
      position:relative;
      overflow:hidden;
    }
    .top-pill{
      width: fit-content;
      margin: 2px auto 12px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #fff1d6, #f2e0bf);
      color:#5a4b37;
      font-weight: 700;
      letter-spacing:.2px;
      display:flex;
      align-items:center;
      gap:10px;
      box-shadow: var(--shadow2);
    }
    .title-row{
      display:flex;
      gap:14px;
      align-items:flex-start;
      justify-content:center;
      padding: 10px 0 6px;
    }
    .fu{
      width:56px;height:56px;
      border-radius: 16px;
      background: radial-gradient(circle at 30% 25%, #cf5a45, #8c2c24 70%);
      display:grid;place-items:center;
      color:#f5d08a;
      font-weight:900;
      font-size: 30px;
      box-shadow: 0 16px 26px rgba(140,44,36,.22);
      flex: 0 0 auto;
      user-select:none;
    }
    h1{
      margin:0;
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1.02;
      letter-spacing:-.9px;
      text-align:left;
      user-select:none;
      cursor: default;
    }
    .sub{
      text-align:center;
      color: var(--muted);
      margin: 6px 0 14px;
      font-size: 18px;
      font-weight: 600;
    }

    .follow-box{
      margin: 0 auto 18px;
      max-width: 860px;
      border: 2px dashed var(--dash);
      border-radius: 20px;
      background: rgba(255,248,239,.55);
      padding: 14px 14px 12px;
      text-align:center;
    }
    .follow-top{
      font-weight: 800;
      color:#5a4b37;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom: 8px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color:#6a543f;
      font-weight: 800;
      text-decoration:none;
      box-shadow: 0 8px 18px rgba(0,0,0,.05);
    }
    .follow-note{ color: var(--muted); font-weight: 650; margin-top: 2px; }

    .stage{ display:grid; grid-template-columns: 1fr; place-items:center; gap: 10px; }

    .wheel-shell{
      position:relative;
      width: min(560px, 92vw);
      aspect-ratio: 1/1;
      margin: 2px auto 6px;
      filter: drop-shadow(0 24px 36px rgba(0,0,0,.10));
      user-select:none;
    }

    .pointer{
      position:absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width:0;height:0;
      border-left: 18px solid transparent;
      border-right:18px solid transparent;
      border-bottom: 28px solid #6c3b2e;
      filter: drop-shadow(0 8px 8px rgba(0,0,0,.12));
      z-index: 6;
    }
    .pointer.flash{
      animation: pointerFlash .42s ease-in-out 3;
    }
    @keyframes pointerFlash{
      0%{ filter: drop-shadow(0 8px 8px rgba(0,0,0,.12)); transform: translateX(-50%) scale(1); }
      50%{ filter: drop-shadow(0 10px 16px rgba(242,193,78,.55)); transform: translateX(-50%) scale(1.06); }
      100%{ filter: drop-shadow(0 8px 8px rgba(0,0,0,.12)); transform: translateX(-50%) scale(1); }
    }

    .wheel-rotor{
      position:absolute;
      inset: 0;
      transform: rotate(0deg);
      will-change: transform;
      z-index: 2;
    }

    /* Winner highlight (SVG paths get this class) */
    .winner-seg{
      stroke: var(--gold) !important;
      stroke-width: 10 !important;
      filter: drop-shadow(0 10px 14px rgba(242,193,78,.35));
    }

    .spin-btn{
      position:absolute;
      left:50%; top:50%;
      transform: translate(-50%,-50%);
      width: 120px; height:120px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.7);
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.85), rgba(184,148,132,.72));
      box-shadow: 0 18px 40px rgba(0,0,0,.16);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-weight: 900;
      font-size: 26px;
      color:#fff;
      cursor:pointer;
      z-index: 7;
      backdrop-filter: blur(4px);
      transition: transform .16s ease;
      text-shadow: 0 1px 0 rgba(0,0,0,.18);
    }
    .spin-btn:active{ transform: translate(-50%,-50%) scale(.97); }
    .spin-btn.bounce{ animation: btnBounce .22s ease; }
    @keyframes btnBounce{
      0%{ transform: translate(-50%,-50%) scale(1); }
      50%{ transform: translate(-50%,-50%) scale(1.06); }
      100%{ transform: translate(-50%,-50%) scale(1); }
    }
    .spin-btn[disabled]{ opacity:.55; cursor:not-allowed; }

    .status{
      text-align:center;
      font-weight: 800;
      color:#6a543f;
      margin: 6px 0 10px;
    }
    .status.good{ color: var(--success); }
    .debug{
      margin-top:8px;
      text-align:center;
      font-size: 13px;
      color:#8a7f74;
      word-break: break-word;
      opacity:.9;
    }

    .result{
      width: min(860px, 100%);
      margin: 6px auto 0;
      background: rgba(255,255,255,.58);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px 16px 18px;
      box-shadow: var(--shadow2);
      position:relative;
      overflow:hidden;
    }
    .result-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom: 10px;
    }
    .tag{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(240,255,244,.85);
      color:#246b2a;
      font-weight: 900;
    }
    .tag.muted{
      background: rgba(255,255,255,.70);
      color:#6a543f;
      font-weight: 850;
    }
    .yougot{
      text-align:center;
      letter-spacing: .48em;
      font-weight: 900;
      color:#6d6258;
      margin: 8px 0 6px;
    }
    .big{
      text-align:center;
      font-size: clamp(34px, 6vw, 56px);
      margin: 0 0 6px;
      font-weight: 950;
      line-height: 1.05;
    }
    .small{
      text-align:center;
      color: var(--muted);
      font-weight: 650;
      font-size: 18px;
      margin-top: 6px;
    }

    .sparkle{
      pointer-events:none;
      position:absolute;
      inset:-40px;
      opacity:0;
    }
    .sparkle.on{
      opacity:1;
      animation: shimmer 1.4s ease-in-out forwards;
    }
    @keyframes shimmer{
      0%{ transform: translateX(-30%); opacity:0; }
      15%{ opacity:1; }
      60%{ opacity:1; }
      100%{ transform: translateX(30%); opacity:0; }
    }

    .footer{
      text-align:center;
      color:#7a6e63;
      font-weight: 700;
      margin-top: 10px;
      font-size: 18px;
    }

    @media (max-width: 430px){
      .spin-btn{ width: 112px; height:112px; font-size: 24px; }
      .follow-box{ padding: 12px 12px 10px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top-pill">🏮 <span>Lantern Festival Special</span></div>

      <div class="title-row">
        <div class="fu">福</div>
        <h1 id="pageTitle">PandaGoldenEar<br/>Lucky Draw</h1>
      </div>

      <div class="sub">Tap <b>Spin</b> to reveal your surprise.</div>

      <div class="follow-box">
        <div class="follow-top">📸 Don’t forget to follow us —
          <a class="pill" href="https://www.instagram.com/pandagoldenear/" target="_blank" rel="noopener">Instagram</a>
          <a class="pill" href="https://www.facebook.com/pandagoldenear" target="_blank" rel="noopener">Facebook</a>
          <span class="pill" style="pointer-events:none; opacity:.9;">TikTok</span>
        </div>
        <div class="follow-note">Follow any <b>ONE</b> platform to stay updated 😉</div>
      </div>

      <div class="stage">
        <div class="wheel-shell">
          <div id="pointer" class="pointer"></div>
          <div id="wheelRotor" class="wheel-rotor" aria-label="Lucky draw wheel"></div>
          <button id="spinBtn" class="spin-btn" type="button">🎉 <span>Spin</span></button>
        </div>

        <div id="status" class="status">Loading prizes…</div>
        <div id="debug" class="debug" style="display:none;"></div>

        <div id="resultCard" class="result" style="display:none;">
          <div id="sparkle" class="sparkle">
            <svg width="1200" height="260" viewBox="0 0 1200 260" preserveAspectRatio="none">
              <defs>
                <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0" stop-color="rgba(255,215,128,0)"/>
                  <stop offset=".5" stop-color="rgba(255,215,128,.75)"/>
                  <stop offset="1" stop-color="rgba(255,215,128,0)"/>
                </linearGradient>
              </defs>
              <rect x="-200" y="0" width="1600" height="260" fill="url(#g)"/>
            </svg>
          </div>

          <div class="result-top">
            <div id="tagLeft" class="tag">PRIZE 🎁</div>
            <div class="tag muted">✅ Played — thanks!</div>
          </div>

          <div class="yougot">YOU GOT</div>
          <div id="bigText" class="big"></div>
          <div id="smallText" class="small"></div>
        </div>

        <div class="footer">Thanks for joining — see you at our dumpling food truck!</div>
      </div>
    </div>
  </div>

<script>
/** =========================
 *  CONFIG
 *  ========================= */
const API_URL = "https://script.google.com/macros/s/AKfycbxk94zQkTeLozqgk4a3fY_TV1LScNDjxU5CRE06ioOEzqUDLkT2-atxWjB4rx2tv38V/exec";

// 你后端可能用的 action 名不一致，这里我做了“自动试探”
const POOL_ACTION_CANDIDATES = ["pool","getPool","prepare","init"];   // ✅ 不够就继续加
const SPIN_ACTION_CANDIDATES = ["spin","draw","play"];               // ✅ 不够就继续加

const LS_PLAYED_KEY = "pge_lucky_played_v4";
const LS_DEVICE_KEY = "pge_lucky_device_v4";

/** =========================
 *  STATE
 *  ========================= */
let pool = [];            // [{row,label,weight,remaining_auto,active}]
let isSpinning = false;
let currentRotation = 0;

const elRotor = document.getElementById("wheelRotor");
const elSpin  = document.getElementById("spinBtn");
const elStatus = document.getElementById("status");
const elDebug = document.getElementById("debug");
const elResult = document.getElementById("resultCard");
const elBig = document.getElementById("bigText");
const elSmall = document.getElementById("smallText");
const elSparkle = document.getElementById("sparkle");
const elTagLeft = document.getElementById("tagLeft");
const elPointer = document.getElementById("pointer");

/** =========================
 *  UTIL
 *  ========================= */
function uid() {
  const t = Date.now().toString(36);
  const r = Math.random().toString(36).slice(2,10);
  return `${t}-${r}`;
}
function getDeviceId(){
  let id = localStorage.getItem(LS_DEVICE_KEY);
  if(!id){ id = uid(); localStorage.setItem(LS_DEVICE_KEY, id); }
  return id;
}
function setPlayed(v){ v ? localStorage.setItem(LS_PLAYED_KEY, "1") : localStorage.removeItem(LS_PLAYED_KEY); }
function isPlayed(){ return localStorage.getItem(LS_PLAYED_KEY) === "1"; }

function setStatus(text, good=false){
  elStatus.textContent = text;
  elStatus.className = "status" + (good ? " good" : "");
}
function showDebug(msg){
  elDebug.style.display = "block";
  elDebug.textContent = msg;
}
function hideDebug(){
  elDebug.style.display = "none";
  elDebug.textContent = "";
}
function safeText(s){ return String(s ?? "").replace(/\s+/g," ").trim(); }
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[m]));
}
function degToRad(d){ return d * Math.PI / 180; }
function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }

/** =========================
 *  API
 *  ========================= */
async function apiGet(params){
  const url = new URL(API_URL);
  Object.entries(params).forEach(([k,v])=> url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { method:"GET", cache:"no-store" });
  const txt = await res.text();
  try { return JSON.parse(txt); } catch { return { ok:true, raw: txt }; }
}

/** Find a pool array anywhere inside response (very robust) */
function findPoolDeep(obj){
  if(!obj) return null;
  if(Array.isArray(obj)){
    // if array items look like pool rows
    if(obj.length && typeof obj[0] === "object") return obj;
    return null;
  }
  if(typeof obj !== "object") return null;

  // common keys
  if(Array.isArray(obj.pool)) return obj.pool;
  if(Array.isArray(obj.data?.pool)) return obj.data.pool;
  if(Array.isArray(obj.result?.pool)) return obj.result.pool;

  // deep search
  for(const k of Object.keys(obj)){
    const found = findPoolDeep(obj[k]);
    if(found) return found;
  }
  return null;
}

/** =========================
 *  WHEEL SVG (arc labels) + winner highlight hooks
 *  ========================= */
function buildWheelSVG(items){
  const size = Math.min(560, Math.floor(window.innerWidth * 0.92));
  const cx = size/2, cy=size/2;
  const R  = size * 0.47;
  const rInner = size * 0.20;  // keep center clear so Spin never blocks text
  const ringStroke = size * 0.015;

  const N = Math.max(2, items.length);
  const step = 360 / N;

  const colors = ["#f7e7d6","#f2f6ff","#e9f8f1","#fff2d9","#f6e9ff","#ffe9ee"];

  function polarToXY(rad, radius){ return [cx + Math.cos(rad)*radius, cy + Math.sin(rad)*radius]; }
  function arcPath(startDeg, endDeg, radius){
    const start = degToRad(startDeg - 90);
    const end   = degToRad(endDeg - 90);
    const [x1,y1]=polarToXY(start, radius);
    const [x2,y2]=polarToXY(end, radius);
    const large = (endDeg-startDeg) > 180 ? 1 : 0;
    return `M ${x1} ${y1} A ${radius} ${radius} 0 ${large} 1 ${x2} ${y2}`;
  }
  function wedgePath(startDeg, endDeg){
    const a1 = degToRad(startDeg - 90);
    const a2 = degToRad(endDeg   - 90);
    const [ox1,oy1]=polarToXY(a1, R);
    const [ox2,oy2]=polarToXY(a2, R);
    const [ix2,iy2]=polarToXY(a2, rInner);
    const [ix1,iy1]=polarToXY(a1, rInner);
    const large = (endDeg-startDeg) > 180 ? 1 : 0;
    return [
      `M ${ix1} ${iy1}`,
      `L ${ox1} ${oy1}`,
      `A ${R} ${R} 0 ${large} 1 ${ox2} ${oy2}`,
      `L ${ix2} ${iy2}`,
      `A ${rInner} ${rInner} 0 ${large} 0 ${ix1} ${iy1}`,
      "Z"
    ].join(" ");
  }

  const svg = [];
  svg.push(`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" aria-hidden="true">`);
  svg.push(`<circle cx="${cx}" cy="${cy}" r="${R}" fill="rgba(255,255,255,.60)" stroke="#e6d8c8" stroke-width="${ringStroke}"/>`);
  svg.push(`<circle cx="${cx}" cy="${cy}" r="${rInner}" fill="rgba(255,255,255,.65)" stroke="#e6d8c8" stroke-width="${ringStroke}"/>`);

  svg.push(`<defs>`);
  for(let i=0;i<N;i++){
    const start = i*step;
    const end   = (i+1)*step;
    const textRadius = R * 0.82;
    svg.push(`<path id="arc-${i}" d="${arcPath(start+8, end-8, textRadius)}" />`);
  }
  svg.push(`</defs>`);

  for(let i=0;i<N;i++){
    const start = i*step;
    const end   = (i+1)*step;
    const fill  = colors[i % colors.length];
    const label = safeText(items[i]?.label || `Item ${i+1}`);
    const fontSize = clamp(size * 0.045, 14, 22);

    // IMPORTANT: give each wedge an id for highlighting later
    svg.push(`<path id="seg-${i}" d="${wedgePath(start,end)}" fill="${fill}" stroke="#e6d8c8" stroke-width="${ringStroke*0.9}"/>`);

    svg.push(`
      <text fill="#5a4b37" font-weight="800" font-size="${fontSize}" letter-spacing=".2px">
        <textPath href="#arc-${i}" startOffset="50%" text-anchor="middle">
          ${escapeHtml(label)}
        </textPath>
      </text>
    `);
  }

  svg.push(`<circle cx="${cx}" cy="${cy}" r="${R*0.62}" fill="rgba(255,255,255,.10)"/>`);
  svg.push(`</svg>`);
  return svg.join("");
}

function clearWinnerHighlight(){
  for(const p of document.querySelectorAll(".winner-seg")){
    p.classList.remove("winner-seg");
  }
}
function highlightWinner(index){
  clearWinnerHighlight();
  const path = document.getElementById(`seg-${index}`);
  if(path) path.classList.add("winner-seg");
}
function flashPointer(){
  elPointer.classList.remove("flash");
  void elPointer.offsetHeight;
  elPointer.classList.add("flash");
}

/** =========================
 *  SPIN
 *  ========================= */
function segmentCenterAngle(index, total){
  const step = 360 / total;
  return (index * step) + step/2;
}

function spinToIndex(index){
  const N = pool.length;
  const targetCenter = segmentCenterAngle(index, N);
  const normalizedTarget = ((-targetCenter) % 360 + 360) % 360;
  const extraTurns = 7 + Math.floor(Math.random()*3);
  const finalRotation = extraTurns*360 + normalizedTarget;

  isSpinning = true;
  elSpin.disabled = true;

  const duration = 5200;
  elRotor.style.transition = `transform ${duration}ms cubic-bezier(.12,.92,.16,1)`;
  currentRotation += finalRotation;
  elRotor.style.transform = `rotate(${currentRotation}deg)`;

  return new Promise(resolve=>{
    setTimeout(()=>{
      const mod = ((currentRotation % 360) + 360) % 360;
      currentRotation = mod;
      elRotor.style.transition = "none";
      elRotor.style.transform = `rotate(${currentRotation}deg)`;
      void elRotor.offsetHeight;

      isSpinning = false;
      elSpin.disabled = false;
      resolve();
    }, duration + 30);
  });
}

/** =========================
 *  RESULT UI
 *  ========================= */
function showResult(payload){
  const type = safeText(payload?.result_type).toLowerCase();
  const text = safeText(payload?.result_text);

  elResult.style.display = "block";
  elBig.textContent = text || "—";

  if(type === "blessing"){
    elTagLeft.textContent = "BLESSING ✨";
    elTagLeft.style.background = "rgba(255,255,255,.70)";
    elTagLeft.style.color = "#6a543f";
    elSmall.textContent = "Thanks for playing — see you at our dumpling food truck!";
    elSparkle.classList.remove("on");
  }else{
    elTagLeft.textContent = "PRIZE 🎁";
    elTagLeft.style.background = "rgba(240,255,244,.85)";
    elTagLeft.style.color = "#246b2a";
    elSmall.textContent = "If you win a prize, show this screen to our staff to claim.";
    elSparkle.classList.remove("on");
    void elSparkle.offsetHeight;
    elSparkle.classList.add("on");
  }
}

/** =========================
 *  LOAD POOL (auto try actions + deep parse)
 *  ========================= */
async function loadPool(){
  setStatus("Loading prizes…");
  hideDebug();

  try{
    let lastRaw = null;
    let foundList = null;
    let usedAction = null;

    for(const act of POOL_ACTION_CANDIDATES){
      const resp = await apiGet({ action: act, t: Date.now() });
      lastRaw = resp;
      const list = findPoolDeep(resp);
      if(list && list.length){
        foundList = list;
        usedAction = act;
        break;
      }
    }

    if(!foundList){
      console.log("POOL raw last:", lastRaw);
      setStatus("Pool not loaded. Check API response in console.", false);
      showDebug("Tip: Your backend pool action may not be in POOL_ACTION_CANDIDATES. Add the correct one there. Also check if Web App is 'Anyone' access.");
      return;
    }

    // normalize pool rows
    pool = foundList.map((x, i)=>({
      row: Number(x.row ?? x.pool_row ?? x.poolRow ?? (i+1)),
      label: safeText(x.label ?? x.prize ?? x.prize_text ?? x.name ?? x.text ?? x.result_text),
      weight: Number(x.weight ?? 1),
      remaining_auto: Number(x.remaining_auto ?? x.remainingAuto ?? x.remaining ?? x.after_remaining ?? 999999),
      active: (x.active === true || String(x.active).toUpperCase()==="TRUE" || x.active === 1 || x.active === "1")
    }));

    // keep active if provided
    const active = pool.filter(p=>p.active !== false);
    if(active.length >= 2) pool = active;

    elRotor.innerHTML = buildWheelSVG(pool);
    clearWinnerHighlight();

    if(isPlayed()){
      setStatus("✅ Already played on this device", true);
      elSpin.disabled = true;
    }else{
      setStatus(`Ready — tap Spin 🎉 (pool action: ${usedAction})`, true);
      elSpin.disabled = false;
    }
  }catch(err){
    console.error(err);
    setStatus("Failed to load prizes. Check API URL / permissions.", false);
    showDebug("If this is a Google Apps Script web app: redeploy + set access to Anyone with link; then refresh.");
  }
}

/** =========================
 *  DO SPIN (auto try actions)
 *  ========================= */
async function doSpin(){
  if(isSpinning) return;
  if(isPlayed()){
    setStatus("✅ Already played on this device", true);
    return;
  }
  if(!pool.length){
    setStatus("Pool not ready yet…", false);
    return;
  }

  elSpin.classList.remove("bounce");
  void elSpin.offsetHeight;
  elSpin.classList.add("bounce");
  setStatus("Spinning…", true);

  try{
    const device_id = getDeviceId();

    let resp = null;
    let usedAction = null;
    for(const act of SPIN_ACTION_CANDIDATES){
      const r = await apiGet({ action: act, device_id, t: Date.now() });
      // crude check: must have result_text or pool_row-ish or ok
      if(r && (r.ok !== false) && (r.pool_row || r.result_text || r.result_type || r.row || r.poolRow)){
        resp = r; usedAction = act; break;
      }
      resp = r; usedAction = act;
    }

    if(!resp || resp.ok === false){
      console.log("SPIN raw:", resp);
      setStatus("Spin failed. Check API response.", false);
      showDebug("Open DevTools → Network → click the request to your script.google.com URL and inspect Response.");
      return;
    }

    const poolRow = Number(resp.pool_row ?? resp.poolRow ?? resp.row);
    let idx = pool.findIndex(p => p.row === poolRow);

    // fallback: match by result_text
    if(idx < 0){
      const txt = safeText(resp.prize ?? resp.result_text ?? resp.resultText);
      idx = pool.findIndex(p => safeText(p.label).toLowerCase() === txt.toLowerCase());
    }
    if(idx < 0) idx = Math.floor(Math.random()*pool.length);

    await spinToIndex(idx);

    // 🔥 highlight + pointer flash AFTER spin stops
    highlightWinner(idx);
    flashPointer();

    showResult({
      result_type: resp.result_type ?? resp.type,
      result_text: resp.result_text ?? resp.text ?? resp.result
    });

    setPlayed(true);
    setStatus(`✅ Played — thanks! (spin action: ${usedAction})`, true);
    elSpin.disabled = true;

  }catch(err){
    console.error(err);
    setStatus("Spin error (network / permissions).", false);
    showDebug("If you see 401/403, redeploy Apps Script web app and ensure 'Anyone' access.");
  }
}

/** =========================
 *  STAFF RESET: long press title → prompt "reset"
 *  ========================= */
(function staffLongPress(){
  const title = document.getElementById("pageTitle");
  let pressTimer = null;

  function start(){
    if(pressTimer) return;
    pressTimer = setTimeout(()=>{
      pressTimer = null;
      const code = prompt("Staff reset: type 'reset' to clear this device.");
      if(String(code).trim().toLowerCase() === "reset"){
        localStorage.removeItem(LS_PLAYED_KEY);
        alert("Reset done ✅");
        location.reload();
      }else if(code !== null){
        alert("Cancelled.");
      }
    }, 1200);
  }
  function cancel(){
    if(pressTimer){ clearTimeout(pressTimer); pressTimer = null; }
  }

  title.addEventListener("touchstart", start, {passive:true});
  title.addEventListener("touchend", cancel, {passive:true});
  title.addEventListener("touchcancel", cancel, {passive:true});
  title.addEventListener("mousedown", start);
  window.addEventListener("mouseup", cancel);
  title.addEventListener("mouseleave", cancel);
})();

/** =========================
 *  EVENTS
 *  ========================= */
elSpin.addEventListener("click", doSpin);
window.addEventListener("resize", ()=>{
  if(pool.length) elRotor.innerHTML = buildWheelSVG(pool);
});

loadPool();
</script>
