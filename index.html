<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PandaGoldenEar Lucky Draw</title>

<style>
:root{
  --bg:#f6efe7;
  --card:#ffffff;
  --line:#e8dccf;
  --brand:#b46b52;
  --green:#1f6b3a;
}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:var(--bg);
  text-align:center;
}

.wrap{
  max-width:520px;
  margin:0 auto;
  padding:16px;
}

h1{
  font-size:22px;
  margin-bottom:12px;
  cursor:pointer;
}

canvas{
  width:100%;
  max-width:360px;
}

.result{
  margin-top:16px;
  border:1px solid var(--line);
  background:#fff;
  border-radius:18px;
  padding:16px;
  display:none;
}

.wonPill{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  border:1px solid var(--line);
  font-weight:900;
  color:#7a3b2d;
}

.claimBar{
  margin:12px 0;
  padding:12px;
  border-radius:16px;
  background:rgba(117,214,149,.2);
  border:1px solid rgba(117,214,149,.5);
  color:var(--green);
  font-weight:900;
}

.big{
  font-size:30px;
  font-weight:1000;
  margin-top:6px;
  color:#7a3b2d;
}

.small{
  margin-top:10px;
  color:#8a857f;
  font-size:13px;
}
</style>
</head>

<body>
<div class="wrap">

<h1 id="titleArea">PandaGoldenEar Lucky Draw</h1>

<canvas id="wheel" width="400" height="400"></canvas>

<div class="result" id="result">
  <div class="wonPill">YOU WON 🎉</div>
  <div class="claimBar">🎁 Show this screen to claim</div>
  <div class="big" id="bigText"></div>
  <div class="small">
    If you win a prize, show this screen to our staff to claim.
  </div>
</div>

</div>

<script>
const SCRIPT_URL = "你的AppsScript_URL";

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let prizes = [];
let angle = 0;
let spinning = false;
let lastPrize = null;

function drawWheel(){
  const cx = 200;
  const cy = 200;
  const radius = 180;
  const step = 2*Math.PI/prizes.length;

  ctx.clearRect(0,0,400,400);

  prizes.forEach((p,i)=>{
    const start = angle + i*step;
    const end = start + step;

    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,radius,start,end);
    ctx.fillStyle = i%2===0 ? "rgba(180,107,82,.08)" : "#fff";
    ctx.fill();
    ctx.strokeStyle="#e8dccf";
    ctx.stroke();

    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(start + step/2);
    ctx.textAlign="right";
    ctx.fillStyle="#7a3b2d";
    ctx.font="14px sans-serif";
    ctx.fillText(p.label, radius-28, 6);
    ctx.restore();
  });

  // center button
  ctx.beginPath();
  ctx.arc(cx,cy,70,0,Math.PI*2);
  ctx.fillStyle="rgba(180,107,82,.35)";
  ctx.fill();

  ctx.beginPath();
  ctx.arc(cx,cy,50,0,Math.PI*2);
  ctx.fillStyle="rgba(180,107,82,.55)";
  ctx.fill();

  ctx.fillStyle="#fff";
  ctx.font="bold 20px sans-serif";
  ctx.textAlign="center";
  ctx.fillText("Spin",cx,cy+6);
}

async function loadPrizes(){
  const res = await fetch(SCRIPT_URL);
  const data = await res.json();
  prizes = data.prizes;
  drawWheel();
}

function spinTo(targetIndex){
  const step = 2*Math.PI/prizes.length;
  const targetAngle = (2*Math.PI*5) + (2*Math.PI - targetIndex*step - step/2);
  const duration = 3000;
  const start = performance.now();
  const initial = angle;

  function animate(now){
    const progress = (now-start)/duration;
    if(progress>=1){
      angle = targetAngle;
      spinning=false;
      drawWheel();
      showResult(prizes[targetIndex]);
      localStorage.setItem("pge_has_spun","1");
      return;
    }
    angle = initial + (targetAngle-initial)*(1-Math.pow(1-progress,3));
    drawWheel();
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
}

async function handleSpin(){
  if(spinning) return;

  if(localStorage.getItem("pge_has_spun")==="1"){
    alert("Already played on this device.");
    return;
  }

  spinning=true;

  const res = await fetch(SCRIPT_URL);
  const data = await res.json();
  const index = prizes.findIndex(p=>p.label===data.prize);

  spinTo(index);
}

function showResult(p){
  const box=document.getElementById("result");
  const text=document.getElementById("bigText");

  if(p.type==="blessing"){
    text.innerText = p.blessing;
  }else{
    text.innerText = p.label;
  }

  box.style.display="block";
}

canvas.addEventListener("click",(e)=>{
  const rect=canvas.getBoundingClientRect();
  const x=e.clientX-rect.left-200;
  const y=e.clientY-rect.top-200;
  if(Math.sqrt(x*x+y*y)<=70){
    handleSpin();
  }
});

// staff long press reset
let pressTimer=null;
const titleArea=document.getElementById("titleArea");

function resetDevice(){
  if(confirm("Reset this device?")){
    localStorage.removeItem("pge_has_spun");
    document.getElementById("result").style.display="none";
    alert("Reset done.");
  }
}

function startPress(){
  pressTimer=setTimeout(resetDevice,1500);
}
function endPress(){
  clearTimeout(pressTimer);
}

titleArea.addEventListener("touchstart",startPress);
titleArea.addEventListener("touchend",endPress);
titleArea.addEventListener("mousedown",startPress);
titleArea.addEventListener("mouseup",endPress);

loadPrizes();
</script>
</body>
</html>
