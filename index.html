<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PandaGoldenEar Lucky Draw</title>
  <style>
    :root{
      --bg:#fbf3e8;
      --card:#fff7ee;
      --brown:#8e4b3d;
      --text:#2a2320;
    }
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      background: radial-gradient(1200px 600px at 50% 0%, #fff, var(--bg));
      color:var(--text);
      display:flex;
      justify-content:center;
    }
    .wrap{ width:min(900px, 92vw); padding:18px 0 40px; }

    .wheelWrap{
      position:relative;
      width:min(520px, 92vw);
      margin: 12px auto 10px;
      aspect-ratio: 1/1;
      filter: drop-shadow(0 18px 30px rgba(0,0,0,.06));
    }
    canvas{
      width:100%;
      height:100%;
      display:block;
      border-radius:50%;
    }
    .pointer{
      position:absolute;
      top:-10px;
      left:50%;
      transform:translateX(-50%);
      width:0;height:0;
      border-left:14px solid transparent;
      border-right:14px solid transparent;
      border-bottom:26px solid var(--brown);
      filter: drop-shadow(0 3px 2px rgba(0,0,0,.18)); /* 轻微浮起阴影 */
      z-index:3;
    }
    /* ✅ Spin 永远正中 */
    .spinBtn{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width: 168px;
      height: 168px;
      border-radius: 50%;
      border: 10px solid rgba(255,255,255,.45);
      background: radial-gradient(circle at 30% 25%, #b86a5a, var(--brown));
      color:#fff;
      font-weight:800;
      font-size:48px;
      letter-spacing:.2px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 14px 24px rgba(0,0,0,.18);
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      z-index:4;
      cursor:pointer;
    }
    .spinBtn small{
      display:block;
      font-size:18px;
      font-weight:700;
      opacity:.9;
      margin-top:6px;
    }
    .spinBtnInner{ text-align:center; line-height:1; }

    .status{
      text-align:center;
      font-size:26px;
      color: rgba(42,35,32,.72);
      font-weight:800;
      margin-top:10px;
    }

    .hint{
      text-align:center;
      font-size:22px;
      color: rgba(42,35,32,.62);
      font-weight:800;
      margin-top:6px;
    }

    .row{
      display:flex;
      gap:10px;
      justify-content:center;
      align-items:center;
      margin-top:12px;
      flex-wrap:wrap;
    }
    .pill{
      padding:10px 14px;
      border-radius:999px;
      border:2px solid rgba(142,75,61,.22);
      background:#fff;
      font-weight:800;
      color:rgba(42,35,32,.75);
    }

    .follow{
      width:min(680px, 92vw);
      margin: 0 auto 14px;
      padding:14px 14px;
      border-radius:18px;
      border:2px dashed rgba(142,75,61,.28);
      background: rgba(255,255,255,.35);
      text-align:center;
    }
    .follow h3{
      margin:0 0 10px;
      font-size:24px;
    }
    .follow .btns{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-bottom:6px;
    }
    .follow a{
      display:inline-block;
      padding:10px 18px;
      border-radius:999px;
      background:#fff;
      border:2px solid rgba(142,75,61,.22);
      font-weight:900;
      color:rgba(42,35,32,.85);
      text-decoration:none;
    }
    .follow p{
      margin:0;
      font-size:18px;
      font-weight:800;
      color: rgba(42,35,32,.62);
    }

    /* 小开关 */
    .toggle{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.6);
      border:2px solid rgba(142,75,61,.18);
      font-weight:900;
      color:rgba(42,35,32,.7);
    }
    .toggle input{ width:18px; height:18px; }

    /* confetti 轻量 */
    .confetti{
      pointer-events:none;
      position:fixed;
      inset:0;
      overflow:hidden;
      z-index:9999;
    }
    .confetti i{
      position:absolute;
      width:8px; height:12px;
      opacity:.9;
      transform: translateY(-20px);
      animation: fall 1.1s ease-in forwards;
    }
    @keyframes fall{
      to { transform: translateY(110vh) rotate(260deg); opacity:0.95; }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="follow">
      <h3>💥 Don’t forget to follow us —</h3>
      <div class="btns">
        <a href="https://www.instagram.com/pandagoldenear/" target="_blank" rel="noopener">Instagram</a>
        <a href="https://www.facebook.com/pandagoldenear" target="_blank" rel="noopener">Facebook</a>
        <a href="https://www.tiktok.com/@pandagoldenearfa" target="_blank" rel="noopener">TikTok</a>
      </div>
      <p>Follow any ONE platform to stay updated 😉</p>
    </div>

    <div class="wheelWrap">
      <div class="pointer"></div>
      <canvas id="wheel"></canvas>

      <div id="spinBtn" class="spinBtn">
        <div class="spinBtnInner">
          Spin
          <small>tap to spin</small>
        </div>
      </div>
    </div>

    <div id="status" class="status">Ready.</div>
    <div class="hint">Thanks! One play per device.</div>

    <div class="row">
      <label class="toggle">
        <input id="soundToggle" type="checkbox" checked />
        Pointer sound
      </label>
    </div>

  </div>

  <div id="confetti" class="confetti" style="display:none;"></div>

  <script>
    // ✅ 你的 CSV 链接（已填好）
    const POOL_CSV_URL  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR1Of71IvsS43kx9oDtQjWMeQDCNFHBw9FQ83YX6VFA2-iS7hOKYRyvrGkGYfsnCirFyzoO8oWe6vZk/pub?gid=0&single=true&output=csv";
    const BLESS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR1Of71IvsS43kx9oDtQjWMeQDCNFHBw9FQ83YX6VFA2-iS7hOKYRyvrGkGYfsnCirFyzoO8oWe6vZk/pub?gid=931297523&single=true&output=csv";

    // -----------------------
    // State
    // -----------------------
    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spinBtn");
    const statusEl = document.getElementById("status");
    const confettiEl = document.getElementById("confetti");
    const soundToggle = document.getElementById("soundToggle");

    const STORAGE_KEY_PLAYED = "pge_lucky_draw_played_v1";
    const STORAGE_KEY_STAFF  = "pge_lucky_draw_staff_unlocked_v1";

    let sectors = [];     // [{label, weight, type, message?}]
    let blessings = [];   // string[]
    let isSpinning = false;
    let currentAngle = 0; // radians

    // -----------------------
    // CSV helpers
    // -----------------------
    function parseCSV(text){
      const rows = text.trim().split(/\r?\n/).map(line => {
        // 简单 CSV（无复杂引号嵌套）够用
        return line.split(",").map(s => s.trim());
      });
      return rows;
    }

    async function fetchCSV(url){
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error("CSV fetch failed: " + res.status);
      return await res.text();
    }

    // 期望 pool 表结构（推荐）：
    // label,weight,type
    // Blessing,60,blessing
    // One More Drink,10,prize
    // ...
    function loadPoolFromCSV(csvText){
      const rows = parseCSV(csvText);
      const header = rows[0].map(h => h.toLowerCase());
      const iLabel = header.indexOf("label");
      const iWeight = header.indexOf("weight");
      const iType = header.indexOf("type");

      const out = [];
      for (let r = 1; r < rows.length; r++){
        const row = rows[r];
        const label = (row[iLabel] ?? "").trim();
        if (!label) continue;
        const weight = Number(row[iWeight] ?? 1) || 1;
        const type = (row[iType] ?? "").trim().toLowerCase() || (label.toLowerCase()==="blessing" ? "blessing" : "prize");
        out.push({ label, weight, type });
      }
      return out;
    }

    // blessings 表：第一列为文案（可以有表头）
    function loadBlessingsFromCSV(csvText){
      const rows = parseCSV(csvText);
      const out = [];
      for (let r = 0; r < rows.length; r++){
        const t = (rows[r][0] ?? "").trim();
        if (!t) continue;
        // 跳过表头（可选）
        if (r === 0 && t.toLowerCase().includes("blessing")) continue;
        out.push(t);
      }
      return out;
    }

    // -----------------------
    // Wheel draw (你要的外圈文字版)
    // -----------------------
    function drawWheel(ctx, canvas, sectors) {
      if (!ctx || !canvas) return;
      if (!Array.isArray(sectors) || sectors.length === 0) return;

      const cssSize = canvas.clientWidth || 420;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(cssSize * dpr);
      canvas.height = Math.floor(cssSize * dpr);
      canvas.style.width = cssSize + "px";
      canvas.style.height = cssSize + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const w = cssSize, h = cssSize;
      const cx = w / 2, cy = h / 2;
      const radius = Math.min(w, h) / 2;

      ctx.clearRect(0, 0, w, h);

      const OUTER_R = radius * 0.98;
      const INNER_CLEAR_R = radius * 0.42; // center更干净，不挡字
      const LABEL_R = radius * 0.84;       // ✅ 外圈更外
      const LABEL_FONT = "800 18px ui-serif, Georgia, 'Times New Roman', serif";
      const LABEL_COLOR = "rgba(60,48,40,0.9)";
      const BORDER_COLOR = "rgba(120, 100, 85, 0.25)";

      const baseColors = [
        { a: "#F2DA74", b: "#FFF3C6" },
        { a: "#F3B1BF", b: "#FFE3EA" },
        { a: "#BFD6FF", b: "#EAF1FF" },
        { a: "#BFEBDD", b: "#EFFFF8" },
        { a: "#F5D0A6", b: "#FFF0DE" },
      ];

      const n = sectors.length;
      const arc = (Math.PI * 2) / n;
      const startOffset = -Math.PI / 2 - arc / 2; // sector0居顶

      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

      function shortenTextToFit(text, maxPx) {
        const t = String(text || "").trim();
        if (!t) return "";
        if (ctx.measureText(t).width <= maxPx) return t;
        const ell = "…";
        let lo = 0, hi = t.length;
        while (lo < hi) {
          const mid = Math.ceil((lo + hi) / 2);
          const s = t.slice(0, mid) + ell;
          if (ctx.measureText(s).width <= maxPx) lo = mid;
          else hi = mid - 1;
        }
        return t.slice(0, lo) + ell;
      }

      function drawOuterBevel() {
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, OUTER_R, 0, Math.PI * 2);
        ctx.closePath();

        const rimGrad = ctx.createRadialGradient(cx, cy, OUTER_R * 0.72, cx, cy, OUTER_R);
        rimGrad.addColorStop(0, "rgba(255,255,255,0.35)");
        rimGrad.addColorStop(0.7, "rgba(255,255,255,0.12)");
        rimGrad.addColorStop(1, "rgba(110,90,70,0.22)");
        ctx.strokeStyle = rimGrad;
        ctx.lineWidth = radius * 0.035;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(cx, cy, OUTER_R * 0.93, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(120,100,85,0.18)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }

      function fillSector(startAngle, endAngle, colorA, colorB) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, OUTER_R, startAngle, endAngle);
        ctx.closePath();

        const g = ctx.createRadialGradient(cx, cy, OUTER_R * 0.2, cx, cy, OUTER_R);
        g.addColorStop(0, colorB);
        g.addColorStop(1, colorA);

        ctx.fillStyle = g;
        ctx.fill();

        ctx.strokeStyle = BORDER_COLOR;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }

      function drawLabelOnOuterRing(startAngle, endAngle, text) {
        const mid = (startAngle + endAngle) / 2;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(mid);

        const shouldFlip = mid > Math.PI / 2 && mid < Math.PI * 1.5;
        if (shouldFlip) ctx.rotate(Math.PI);

        ctx.font = LABEL_FONT;
        ctx.fillStyle = LABEL_COLOR;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        const sectorArcLen = arc * LABEL_R;
        const maxTextWidth = clamp(sectorArcLen * 0.92, 70, 320);
        const label = shortenTextToFit(text, maxTextWidth);

        ctx.fillText(label, 0, -LABEL_R);
        ctx.restore();
      }

      function clearCenterArea() {
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, INNER_CLEAR_R, 0, Math.PI * 2);
        ctx.closePath();

        const centerGrad = ctx.createRadialGradient(cx, cy, INNER_CLEAR_R * 0.15, cx, cy, INNER_CLEAR_R);
        centerGrad.addColorStop(0, "rgba(255,255,255,0.12)");
        centerGrad.addColorStop(1, "rgba(255,255,255,0.40)");
        ctx.fillStyle = centerGrad;
        ctx.fill();

        ctx.strokeStyle = "rgba(120,100,85,0.18)";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
      }

      for (let i = 0; i < n; i++) {
        const start = startOffset + i * arc;
        const end = start + arc;
        const c = baseColors[i % baseColors.length];
        fillSector(start, end, c.a, c.b);
      }

      drawOuterBevel();

      for (let i = 0; i < n; i++) {
        const start = startOffset + i * arc;
        const end = start + arc;
        drawLabelOnOuterRing(start, end, sectors[i]?.label ?? "");
      }

      clearCenterArea();
    }

    // -----------------------
    // Picking + animation
    // -----------------------
    function weightedPick(items){
      const total = items.reduce((s,x)=>s + (Number(x.weight)||0), 0);
      let r = Math.random() * total;
      for (const it of items){
        r -= (Number(it.weight)||0);
        if (r <= 0) return it;
      }
      return items[items.length - 1];
    }

    function sectorIndexByLabel(label){
      const norm = String(label||"").trim().toLowerCase();
      return sectors.findIndex(s => String(s.label||"").trim().toLowerCase() === norm);
    }

    function targetAngleForSectorIndex(idx){
      // wheel is drawn with startOffset = -pi/2 - arc/2
      // To land on sector idx under pointer at 12 o'clock:
      const n = sectors.length;
      const arc = (Math.PI*2)/n;
      const startOffset = -Math.PI/2 - arc/2;
      const mid = startOffset + idx*arc + arc/2;

      // pointer is at -pi/2 (12 o'clock). We need rotation so that mid aligns to -pi/2
      // After rotation by angle A, a point at angle mid becomes mid + A.
      // Want mid + A = -pi/2  => A = -pi/2 - mid
      return (-Math.PI/2) - mid;
    }

    function easeOutCubic(t){ return 1 - Math.pow(1-t,3); }

    // 轻量 confetti（只在非 blessing）
    function fireConfetti(){
      confettiEl.innerHTML = "";
      confettiEl.style.display = "block";
      const colors = ["#F2DA74","#F3B1BF","#BFD6FF","#BFEBDD","#F5D0A6","#fff"];
      const count = 26;
      for (let i=0;i<count;i++){
        const el = document.createElement("i");
        const x = Math.random()*100;
        const delay = Math.random()*120;
        const size = 6 + Math.random()*6;
        el.style.left = x + "vw";
        el.style.top = "-10px";
        el.style.width = size + "px";
        el.style.height = (size*1.3) + "px";
        el.style.background = colors[Math.floor(Math.random()*colors.length)];
        el.style.borderRadius = Math.random()>0.5 ? "2px" : "999px";
        el.style.animationDelay = delay + "ms";
        confettiEl.appendChild(el);
      }
      setTimeout(()=>{ confettiEl.style.display="none"; }, 1400);
    }

    // “咔哒”音效：用 WebAudio 合成 click（无需外部 mp3）
    let audioCtx = null;
    function clickSound(){
      if (!soundToggle.checked) return;
      try{
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // iOS: 必须用户交互后才能 resume
        if (audioCtx.state === "suspended") audioCtx.resume();

        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = "square";
        o.frequency.setValueAtTime(1200, audioCtx.currentTime);
        g.gain.setValueAtTime(0.08, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.035);
        o.connect(g); g.connect(audioCtx.destination);
        o.start();
        o.stop(audioCtx.currentTime + 0.04);
      }catch(e){}
    }

    function setPlayed(val){
      localStorage.setItem(STORAGE_KEY_PLAYED, val ? "1" : "0");
    }
    function isPlayed(){
      return localStorage.getItem(STORAGE_KEY_PLAYED) === "1";
    }

    // ✅ 只给员工看的 reset：长按标题（你后面如果要加 title，按这个思路即可）
    // 这版先不显示“员工提示弹窗”，避免消费者看到

    async function spinOnce(){
      if (isSpinning) return;

      // 已玩过：直接静默提示（不暴露 staff 机制）
      if (isPlayed()){
        statusEl.textContent = "Thanks! One play per device.";
        return;
      }

      isSpinning = true;
      statusEl.textContent = "Spinning…";

      // pick prize
      const picked = weightedPick(sectors);
      const idx = sectorIndexByLabel(picked.label);
      const baseTarget = targetAngleForSectorIndex(Math.max(0, idx));

      // ✅ 每次都保证“圈数足够多且速度一致”（解决 reset 后半圈/一圈问题）
      const extraTurns = 6 + Math.floor(Math.random()*2); // 6~7 圈
      const targetAngle = baseTarget + extraTurns * Math.PI * 2;

      const start = currentAngle;
      const delta = targetAngle - start;

      const dur = 1350; // 固定时长，第二次也一样快
      const t0 = performance.now();

      // pointer tick simulation (按角度变化大致触发)
      let lastTickBucket = 0;

      function frame(now){
        const t = Math.min(1, (now - t0) / dur);
        const e = easeOutCubic(t);
        currentAngle = start + delta * e;

        // tick: 每过一个小角度区间触发一次
        const bucket = Math.floor((currentAngle % (Math.PI*2)) / (Math.PI/10));
        if (bucket !== lastTickBucket){
          lastTickBucket = bucket;
          clickSound();
        }

        render();
        if (t < 1) requestAnimationFrame(frame);
        else{
          // finish
          isSpinning = false;
          setPlayed(true);

          // result UI
          if (picked.type === "blessing"){
            const msg = blessings.length ? blessings[Math.floor(Math.random()*blessings.length)] : "Blessing ✨";
            statusEl.textContent = msg;
          }else{
            statusEl.textContent = "YOU WON 🎉  " + picked.label;
            fireConfetti();
          }
        }
      }

      requestAnimationFrame(frame);
    }

    function render(){
      ctx.save();
      // rotate around center
      const w = canvas.clientWidth || 420;
      const cx = w/2, cy = w/2;
      ctx.translate(cx, cy);
      ctx.rotate(currentAngle);
      ctx.translate(-cx, -cy);

      drawWheel(ctx, canvas, sectors);
      ctx.restore();
    }

    // -----------------------
    // Init
    // -----------------------
    async function init(){
      try{
        const [poolCsv, blessCsv] = await Promise.all([
          fetchCSV(POOL_CSV_URL),
          fetchCSV(BLESS_CSV_URL)
        ]);

        sectors = loadPoolFromCSV(poolCsv);

        // 兜底：如果 pool 里没 type，给 Blessing 自动识别
        sectors = sectors.map(s => ({
          ...s,
          type: s.type || (String(s.label).toLowerCase()==="blessing" ? "blessing" : "prize")
        }));

        blessings = loadBlessingsFromCSV(blessCsv);

        // 初始绘制
        currentAngle = 0;
        render();

        statusEl.textContent = "Tap Spin to reveal your surprise.";
      }catch(err){
        statusEl.textContent = "Load failed. Please check CSV publish link.";
        console.error(err);
      }
    }

    // 强点击感：click + touchstart 都绑定
    spinBtn.addEventListener("click", spinOnce, { passive: true });
    spinBtn.addEventListener("touchstart", (e)=>{ /* iOS 触发交互，利于音频 */ }, { passive: true });

    window.addEventListener("resize", ()=>{ if (sectors.length) render(); });

    init();
  </script>
</body>
</html>
