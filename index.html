<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PandaGoldenEar Lucky Draw</title>

<style>
:root{
  --bg:#f4efe6;
  --card:#fbf8f2;
  --ink:#151515;
  --muted:#6f6a62;
  --brand:#7a2c2c;
  --border:#e6dccb;
  --shadow:0 18px 45px rgba(20,20,20,.08);
  --radius:28px;
}
*{box-sizing:border-box}
body{
  margin:0;
  background: radial-gradient(1200px 600px at 50% -10%, #fff, var(--bg));
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  color:var(--ink);
  padding:22px 14px 28px;
}
.wrap{max-width:980px;margin:0 auto}
.card{
  background:linear-gradient(180deg,#fff, var(--card));
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  border-radius:var(--radius);
  padding:28px 22px 26px;
}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:999px;
  border:1px solid var(--border);
  background:linear-gradient(180deg,#fff6dd,#f6e6c6);
  font-weight:800;color:#5a4b2d;margin:6px auto 18px;
}
.title{display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
.fu{
  width:52px;height:52px;border-radius:12px;
  display:grid;place-items:center;
  background:linear-gradient(180deg,#d34d3a,#8f1d16);
  color:#ffd46b;font-weight:900;font-size:26px;
}
h1{margin:0;font-size:clamp(34px,5vw,62px);letter-spacing:-1px}
.sub{text-align:center;color:var(--muted);margin:8px 0 18px}

.gate{
  margin:16px auto 18px;
  padding:18px;border-radius:22px;
  border:1px solid var(--border);
  background:#fff;
}
.row{display:flex;gap:14px;justify-content:center;align-items:center;flex-wrap:wrap}
.btn{
  border:1px solid var(--border);
  background:#fff;border-radius:999px;
  padding:14px 18px;font-weight:900;
  cursor:pointer;display:inline-flex;
  align-items:center;gap:10px;
}
.btn:hover{transform:translateY(-1px)}
.btn[disabled]{opacity:.45;cursor:not-allowed}
.icon{width:22px;height:22px;fill:currentColor}
.or{font-weight:900;color:#7a6a55}

.spinWrap{display:flex;justify-content:center;margin:18px 0}
.spinBtn{
  border-radius:18px;padding:16px 22px;
  background:linear-gradient(180deg,#9b3a36,#7a2c2c);
  color:#fff;font-weight:950;font-size:20px;
  border:none;
}
.pill{
  margin:10px auto 0;width:fit-content;
  padding:14px 18px;border-radius:999px;
  background:#eee;font-weight:900;
  display:none;
}
.result{
  margin:18px auto 0;max-width:820px;
  border-radius:24px;border:1px solid var(--border);
  background:#fff;padding:20px;
  display:none;text-align:center;
}
.tag{font-weight:900;letter-spacing:2px;color:#6b6257;font-size:13px}
.won{font-size:clamp(32px,4vw,56px);font-weight:1000;color:#7b2f2c}
.claim{color:var(--muted);font-weight:600}
.footerNote{text-align:center;margin:18px 0 0;color:var(--muted);font-weight:700}
@media(max-width:520px){.or{display:none}}
</style>
</head>

<body>
<div class="wrap">
<div class="card">

<div style="display:flex;justify-content:center">
  <div class="badge">Lantern Festival Special</div>
</div>

<div class="title">
  <div class="fu">福</div>
  <h1>PandaGoldenEar Lucky Draw</h1>
</div>

<div class="sub">Follow any ONE account to unlock your spin.</div>

<div class="gate">
<div class="row">
<button class="btn" id="igBtn">
<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect>
<circle cx="12" cy="12" r="4"></circle>
<circle cx="17.5" cy="6.5" r="1.5"></circle>
</svg>
Instagram
</button>

<span class="or">or</span>

<button class="btn" id="fbBtn">
<svg class="icon" viewBox="0 0 24 24">
<path d="M13.5 22v-8h2.7l.4-3H13.5V9.1c0-.9.3-1.6 1.6-1.6h1.6V4.8c-.3 0-1.4-.1-2.7-.1-2.6 0-4.3 1.6-4.3 4.5V11H7v3h2.1v8h4.4z"/>
</svg>Facebook</button>

<span class="or">or</span>

<button class="btn" id="ttBtn">
<svg class="icon" viewBox="0 0 24 24">
<path d="M14 3c.6 2.9 2.6 4.9 5 5.2V11c-2 0-3.8-.7-5-2v7.3c0 2.9-2.3 5.2-5.2 5.2A5.2 5.2 0 0 1 3.6 16c0-2.9 2.3-5.2 5.2-5.2.4 0 .8 0 1.2.1V14c-.3-.2-.7-.3-1.2-.3-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2V3h3z"/>
</svg>TikTok</button>
</div>
</div>

<div class="spinWrap">
<button class="btn spinBtn" id="spinBtn" disabled>🎉 Spin</button>
</div>

<div class="pill" id="playedPill">Already played on this device</div>

<div class="result" id="resultBox">
<div class="tag" id="resultTag"></div>
<div class="won" id="resultText"></div>
<div class="claim" id="claimText"></div>
</div>

<div class="footerNote">Thanks for joining — see you at the dumpling stall!</div>

</div>
</div>

<script>
const POOL_CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR1Of71IvsS43kx9oDtQjWMeQDCNFHBw9FQ83YX6VFA2-iS7hOKYRyvrGkGYfsnCirFyzoO8oWe6vZk/pub?gid=0&single=true&output=csv";
const BLESS_CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR1Of71IvsS43kx9oDtQjWMeQDCNFHBw9FQ83YX6VFA2-iS7hOKYRyvrGkGYfsnCirFyzoO8oWe6vZk/pub?gid=931297523&single=true&output=csv";

const INSTAGRAM_URL="https://www.instagram.com/pandagoldenear/";
const FACEBOOK_URL="https://www.facebook.com/pandagoldenear";
const TIKTOK_URL="https://www.tiktok.com/@pandagoldenear?_r=1&_t=ZS-9469qJRTdAa";

const KEY_UNLOCKED="pge_unlocked_v1";
const KEY_PLAYED="pge_played_v1";

const igBtn=document.getElementById("igBtn");
const fbBtn=document.getElementById("fbBtn");
const ttBtn=document.getElementById("ttBtn");
const spinBtn=document.getElementById("spinBtn");
const playedPill=document.getElementById("playedPill");
const resultBox=document.getElementById("resultBox");
const resultText=document.getElementById("resultText");
const claimText=document.getElementById("claimText");
const resultTag=document.getElementById("resultTag");

function parseCSV(text){
const rows=text.trim().split("\n").map(r=>r.split(","));
const header=rows[0];
return rows.slice(1).map(r=>{
const o={};header.forEach((h,i)=>o[h.trim()]=r[i]?.trim());return o;
});
}
function asBool(v){return String(v).toLowerCase()==="true";}
function asNum(v){return Number(v)||0;}

async function load(url){
const res=await fetch(url,{cache:"no-store"});
return parseCSV(await res.text());
}

function pickWeighted(items){
const total=items.reduce((s,x)=>s+asNum(x.weight),0);
let r=Math.random()*total;
for(const it of items){r-=asNum(it.weight);if(r<=0)return it;}
return items[0];
}

function isUnlocked(){return localStorage.getItem(KEY_UNLOCKED)==="1";}
function setUnlocked(){localStorage.setItem(KEY_UNLOCKED,"1");refresh();}
function hasPlayed(){return localStorage.getItem(KEY_PLAYED)==="1";}
function setPlayed(){localStorage.setItem(KEY_PLAYED,"1");refresh();}

function refresh(){
spinBtn.disabled=!isUnlocked()||hasPlayed();
playedPill.style.display=hasPlayed()?"block":"none";
}

igBtn.onclick=()=>{window.open(INSTAGRAM_URL,"_blank");setUnlocked();}
fbBtn.onclick=()=>{window.open(FACEBOOK_URL,"_blank");setUnlocked();}
ttBtn.onclick=()=>{window.open(TIKTOK_URL,"_blank");setUnlocked();}

spinBtn.onclick=async()=>{
if(hasPlayed())return;
spinBtn.disabled=true;
const pool=await load(POOL_CSV_URL);
const blessings=await load(BLESS_CSV_URL);

const activePool=pool.filter(p=>asBool(p.active_auto)&&asNum(p.remaining_auto)>0);
if(!activePool.length){resultTag.textContent="BLESSING ✨";resultText.textContent="Good luck!";setPlayed();return;}

const picked=pickWeighted(activePool);
if(String(picked.type).toLowerCase()==="blessing"){
const activeBless=blessings.filter(b=>asBool(b.active));
const b=pickWeighted(activeBless);
resultTag.textContent="BLESSING ✨";
resultText.textContent=b?.blessing||"Good luck!";
claimText.textContent="";
}else{
resultTag.textContent="YOU WON 🎉";
resultText.textContent=picked.prize;
claimText.innerHTML='If you win a <b>prize</b>, show this screen to our staff to claim.';
}
resultBox.style.display="block";
setPlayed();
};

refresh();
</script>
</body>
</html>
