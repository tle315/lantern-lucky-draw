<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lucky Draw Test</title>
  <style>
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      margin:0; min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      background:#f6efe7;
    }
    .card{
      background:#fff;
      border:1px solid #e8dccf;
      border-radius:16px;
      padding:22px 18px;
      width:min(520px, 90vw);
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }
    h1{ margin:0 0 14px; font-size:34px; }
    button{
      padding:12px 18px;
      border-radius:10px;
      border:none;
      background:#b46b52;
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }
    #result{ margin-top:14px; font-size:18px; }
  </style>
</head>

<body>
  <div class="card">
    <h1>Lucky Draw Test</h1>
    <button id="btn">Test API</button>
    <div id="result">Ready.</div>
  </div>

  <script>
    const SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE";

    async function testAPI(){
      const el = document.getElementById("result");
      el.innerText = "Calling API...";
      try{
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        el.innerText = "You got: " + (data.prize ?? JSON.stringify(data));
      }catch(err){
        el.innerText = "Error: " + err;
      }
    }

    document.getElementById("btn").addEventListener("click", testAPI);
  </script>
</body>
</html>
