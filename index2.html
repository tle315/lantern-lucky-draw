<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>PandaGoldenEar Lucky Draw</title>
  <style>
    :root{
      --bg:#fbf6ee;
      --card:#fffdf8;
      --ink:#141414;
      --muted:#6d6d6d;
      --line:#e7dccb;
      --brand:#8b3a2f;
      --brand2:#caa8a2;
      --good:#2f7d4a;
      --shadow: 0 18px 60px rgba(0,0,0,.06);
      --radius:28px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: radial-gradient(1200px 600px at 50% 0%, #fff 0%, var(--bg) 55%, #f7efe2 100%);
      color:var(--ink);
    }
    .wrap{
      max-width: 860px;
      margin: 18px auto 40px;
      padding: 18px 16px 32px;
    }
    .shell{
      background: linear-gradient(180deg, rgba(255,255,255,.82), rgba(255,255,255,.55));
      border:1px solid rgba(231,220,203,.8);
      border-radius: 34px;
      box-shadow: var(--shadow);
      padding: 20px 18px 26px;
      overflow:hidden;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff7e3;
      color:#6a5436;
      font-weight:700;
      letter-spacing:.2px;
      margin: 6px auto 10px;
    }
    .top{
      text-align:center;
      padding: 4px 6px 8px;
    }

    .fu{
      width:64px;height:64px;
      display:grid;place-items:center;
      margin: 8px auto 10px;
      border-radius: 18px;
      background: linear-gradient(180deg, #c44a3f, #7b261f);
      box-shadow: 0 12px 32px rgba(139,58,47,.25);
      color:#f3d07a;
      font-weight:900;
      font-size:34px;
      letter-spacing:1px;
    }

    h1{
      margin: 8px 0 8px;
      font-size: clamp(34px, 7.2vw, 66px);
      line-height:1.02;
      letter-spacing:-.8px;
    }
    .sub{
      margin: 8px auto 18px;
      font-size: clamp(16px, 3.6vw, 22px);
      color: var(--muted);
      max-width: 36ch;
      line-height:1.35;
    }

    .grid{
      margin: 10px auto 16px;
      background: rgba(255,255,255,.65);
      border:1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
    }

    .stepbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 10px;
      padding: 6px 6px 10px;
    }
    .stepTitle{
      text-transform:uppercase;
      letter-spacing:2px;
      font-weight:800;
      font-size: 14px;
      color:#6a5a46;
      opacity:.9;
    }
    .status{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding: 10px 14px;
      border-radius: 999px;
      border:1px solid #cde7d6;
      background:#eaf8ef;
      color: var(--good);
      font-weight: 900;
      white-space:nowrap;
      min-height: 42px;
    }
    .dot{
      width:12px;height:12px;border-radius:99px;background:var(--good);
      box-shadow: 0 0 0 6px rgba(47,125,74,.12);
    }

    .btnRow{
      display:flex;
      flex-direction:column;
      gap: 12px;
      padding: 6px 6px 2px;
    }
    .socialBtn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 12px;
      text-decoration:none;
      padding: 14px 14px;
      border-radius: 999px;
      border: 2px solid var(--line);
      background: #fffdf8;
      font-weight: 900;
      color: var(--ink);
      box-shadow: 0 10px 22px rgba(0,0,0,.04);
      -webkit-tap-highlight-color: transparent;
    }
    .socialBtn:active{transform: translateY(1px)}
    .hint{
      margin: 10px 6px 0;
      padding: 12px 14px;
      border-radius: 20px;
      border: 2px dashed rgba(202,168,162,.7);
      color:#7a6a56;
      font-weight: 700;
      background: rgba(255,255,255,.55);
      text-align:center;
    }

    .spinWrap{
      margin: 18px auto 10px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 10px;
    }
    .spinBtn{
      width: min(560px, 100%);
      border:none;
      border-radius: 26px;
      padding: 18px 18px;
      font-size: 26px;
      font-weight: 900;
      color:#fff;
      background: linear-gradient(180deg, var(--brand2), #b38f89);
      box-shadow: 0 18px 40px rgba(179,143,137,.35);
      cursor:pointer;
    }
    .spinBtn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      filter: grayscale(.15);
    }

    .playedBadge{
      width:min(560px,100%);
      display:none;
      align-items:center;
      gap: 10px;
      justify-content:flex-start;
      padding: 14px 16px;
      border-radius: 18px;
      border:1px solid #cde7d6;
      background:#eaf8ef;
      color: var(--good);
      font-weight: 900;
    }

    .resultCard{
      margin: 14px auto 0;
      width: 100%;
      background: rgba(255,255,255,.75);
      border:1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px 16px;
      display:none;
      text-align:center;
    }
    .kicker{
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 3px;
      color:#7a6a56;
      font-size: 13px;
      margin-bottom: 10px;
    }
    .resultTitle{
      font-weight: 1000;
      font-size: clamp(26px, 6vw, 46px);
      line-height: 1.08;
      color: var(--brand);
    }
    .resultNote{
      margin-top: 10px;
      color:#6b6b6b;
      font-weight: 700;
      font-size: 16px;
    }
    .footer{
      margin-top: 14px;
      text-align:center;
      color:#7b7b7b;
      font-weight: 700;
      font-size: 18px;
    }

    /* icons */
    .icon{
      width: 22px; height: 22px;
      display:inline-block;
    }
    .ig svg{width:22px;height:22px}
    .fb svg{width:22px;height:22px}
    .tt svg{width:22px;height:22px}

    @media (min-width: 720px){
      .btnRow{flex-direction:row}
      .socialBtn{flex:1}
      .hint{margin-top: 12px}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="shell">
      <div class="top">
        <div class="pill">🏮 Lantern Festival Special</div>
        <div class="fu">福</div>
        <h1>PandaGoldenEar<br/>Lucky Draw</h1>
        <div class="sub">Follow any <b>ONE</b> account to unlock your spin.</div>
      </div>

      <div class="grid">
        <div class="stepbar">
          <div class="stepTitle">STEP 1 · FOLLOW TO UNLOCK</div>
          <div class="status" id="unlockStatus"><span class="dot"></span><span id="unlockText">Locked</span></div>
        </div>

        <div class="btnRow">
          <!-- IMPORTANT: target=_blank prevents Chrome/WeChat blank page after returning -->
          <a class="socialBtn" id="btnIG" href="https://www.instagram.com/pandagoldenear/" target="_blank" rel="noopener noreferrer">
            <span class="ig icon" aria-hidden="true">
              <!-- clean IG outline -->
              <svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3.5" y="3.5" width="17" height="17" rx="5"></rect>
                <circle cx="12" cy="12" r="4"></circle>
                <circle cx="17.2" cy="6.8" r="1"></circle>
              </svg>
            </span>
            Instagram
          </a>

          <a class="socialBtn" id="btnFB" href="https://www.facebook.com/pandagoldenear" target="_blank" rel="noopener noreferrer">
            <span class="fb icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="#1877F2">
                <path d="M13.5 22v-8h2.7l.4-3H13.5V9.3c0-.9.2-1.6 1.6-1.6h1.6V5.1c-.8-.1-1.9-.2-3-.2-2.9 0-4.9 1.8-4.9 5v1.1H6.4v3h2.4v8h4.7z"/>
              </svg>
            </span>
            Facebook
          </a>

          <a class="socialBtn" id="btnTT" href="https://www.tiktok.com/@pandagoldenear?_r=1&_t=ZS-9469qJRTdAa" target="_blank" rel="noopener noreferrer">
            <span class="tt icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="#111">
                <path d="M16.6 6.2c.8.9 1.9 1.5 3.2 1.6v3.1c-1.3-.1-2.6-.6-3.7-1.4v7c0 3.2-2.6 5.8-5.8 5.8S4.5 19.7 4.5 16.5s2.6-5.8 5.8-5.8c.4 0 .8 0 1.2.1v3.3c-.4-.2-.8-.3-1.2-.3-1.5 0-2.7 1.2-2.7 2.7s1.2 2.7 2.7 2.7 2.7-1.2 2.7-2.7V2.8h3.1c.1 1.3.6 2.5 1.3 3.4z"/>
              </svg>
            </span>
            TikTok
          </a>
        </div>

        <div class="hint">👉 Tap any button above. Then your spin unlocks.</div>
      </div>

      <div class="spinWrap">
        <button class="spinBtn" id="spinBtn" disabled>🎉 Spin</button>
        <div class="playedBadge" id="playedBadge">🟢 Played — thanks!</div>
      </div>

      <div class="resultCard" id="resultCard">
        <div class="kicker" id="resultKicker">YOU GOT 🎊</div>
        <div class="resultTitle" id="resultTitle"></div>
        <div class="resultNote" id="resultNote"></div>
      </div>

      <div class="footer">Thanks for joining — see you at the dumpling stall!</div>
    </div>
  </div>

<script>
/** =========================
 *  CONFIG (your published CSV URLs)
 *  ========================= */
const POOL_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR1Of71IvsS43kx9oDtQjWMeQDCNFHBw9FQ83YX6VFA2-iS7hOKYRyvrGkGYfsnCirFyzoO8oWe6vZk/pub?gid=0&single=true&output=csv";
const BLESS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR1Of71IvsS43kx9oDtQjWMeQDCNFHBw9FQ83YX6VFA2-iS7hOKYRyvrGkGYfsnCirFyzoO8oWe6vZk/pub?gid=931297523&single=true&output=csv";

/** =========================
 *  STORAGE KEYS
 *  ========================= */
const KEY_UNLOCKED = "pge_lucky_unlocked_v1";
const KEY_PLAYED   = "pge_lucky_played_v1";

/** =========================
 *  UTIL
 *  ========================= */
function qs(sel){ return document.querySelector(sel); }
function clamp(n,min,max){ return Math.max(min, Math.min(max,n)); }
function isTrue(v){
  return String(v || "").trim().toLowerCase() === "true";
}
function num(v, fallback=0){
  const n = Number(String(v).trim());
  return Number.isFinite(n) ? n : fallback;
}
function cacheBust(url){
  const t = Date.now();
  return url + (url.includes("?") ? "&" : "?") + "t=" + t;
}

/** =========================
 *  CSV PARSER (simple, robust enough for your sheet)
 *  ========================= */
function parseCSV(text){
  // Basic CSV parser handling quoted fields
  const rows = [];
  let row = [];
  let cur = "";
  let inQ = false;

  for (let i=0; i<text.length; i++){
    const ch = text[i];
    const next = text[i+1];

    if (ch === '"' && inQ && next === '"'){ cur += '"'; i++; continue; }
    if (ch === '"'){ inQ = !inQ; continue; }
    if (ch === "\n" && !inQ){
      row.push(cur); rows.push(row);
      row = []; cur = "";
      continue;
    }
    if (ch === "," && !inQ){
      row.push(cur); cur = "";
      continue;
    }
    if (ch === "\r") continue;
    cur += ch;
  }
  // last
  if (cur.length || row.length){
    row.push(cur); rows.push(row);
  }
  return rows;
}

function rowsToObjects(rows){
  if (!rows || rows.length < 2) return [];
  const header = rows[0].map(h => String(h).trim());
  const out = [];
  for (let i=1; i<rows.length; i++){
    const r = rows[i];
    if (!r || r.every(x => String(x||"").trim()==="")) continue;
    const obj = {};
    header.forEach((h, idx) => obj[h] = r[idx]);
    out.push(obj);
  }
  return out;
}

/** =========================
 *  DATA LOAD
 *  ========================= */
let pool = [];
let blessings = [];

async function loadCSVObjects(url){
  const res = await fetch(cacheBust(url), { cache: "no-store" });
  if (!res.ok) throw new Error("CSV fetch failed: " + res.status);
  const text = await res.text();
  const rows = parseCSV(text);
  return rowsToObjects(rows);
}

async function loadAll(){
  const [poolObjs, blessObjs] = await Promise.all([
    loadCSVObjects(POOL_CSV_URL),
    loadCSVObjects(BLESS_CSV_URL)
  ]);

  // Pool rows: prize, weight, remaining, remaining_auto, type, active, active_auto
  pool = poolObjs.map(x => ({
    prize: String(x.prize || x.Prize || "").trim(),
    weight: num(x.weight, 0),
    remaining_auto: num(x.remaining_auto, num(x.remaining, 0)),
    type: String(x.type || "").trim().toLowerCase(),
    active_auto: isTrue(x.active_auto ?? x.active ?? "TRUE")
  }))
  .filter(x => x.prize);

  blessings = blessObjs.map(x => ({
    blessing: String(x.blessing || x.Blessing || x.A || "").trim(),
    weight: num(x.weight, 1),
    active: isTrue(x.active ?? "TRUE")
  }))
  .filter(x => x.blessing && x.active);

  // only keep available pool rows
  pool = pool.filter(x => x.active_auto && x.remaining_auto > 0 && x.weight > 0);

  if (!blessings.length){
    // fallback, in case sheet parsing fails
    blessings = [{ blessing: "Good luck is coming your way :)", weight: 1, active:true }];
  }
}

/** =========================
 *  WEIGHTED PICK
 *  ========================= */
function pickWeighted(items, weightKey="weight"){
  const total = items.reduce((s,it)=> s + (Number(it[weightKey])||0), 0);
  if (total <= 0) return null;
  let r = Math.random() * total;
  for (const it of items){
    r -= (Number(it[weightKey])||0);
    if (r <= 0) return it;
  }
  return items[items.length-1] || null;
}

/** =========================
 *  UI STATE
 *  ========================= */
const spinBtn = qs("#spinBtn");
const playedBadge = qs("#playedBadge");
const unlockText = qs("#unlockText");
const unlockStatus = qs("#unlockStatus");
const resultCard = qs("#resultCard");
const resultTitle = qs("#resultTitle");
const resultNote = qs("#resultNote");
const resultKicker = qs("#resultKicker");

function setUnlocked(v){
  localStorage.setItem(KEY_UNLOCKED, v ? "1" : "0");
  renderLock();
}

function getUnlocked(){
  return localStorage.getItem(KEY_UNLOCKED) === "1";
}
function setPlayed(v){
  localStorage.setItem(KEY_PLAYED, v ? "1" : "0");
  renderPlayed();
}
function getPlayed(){
  return localStorage.getItem(KEY_PLAYED) === "1";
}

function renderLock(){
  const unlocked = getUnlocked();
  unlockText.textContent = unlocked ? "Unlocked" : "Locked";
  unlockStatus.style.borderColor = unlocked ? "#cde7d6" : "#e7dccb";
  unlockStatus.style.background = unlocked ? "#eaf8ef" : "#fff7e3";
  unlockStatus.style.color = unlocked ? "var(--good)" : "#6a5436";
  unlockStatus.querySelector(".dot").style.background = unlocked ? "var(--good)" : "#caa8a2";
  unlockStatus.querySelector(".dot").style.boxShadow = unlocked ? "0 0 0 6px rgba(47,125,74,.12)" : "0 0 0 6px rgba(202,168,162,.16)";

  spinBtn.disabled = !unlocked || getPlayed();
}

function renderPlayed(){
  const played = getPlayed();
  playedBadge.style.display = played ? "flex" : "none";
  spinBtn.disabled = !getUnlocked() || played;
}

function showResult(title, note, isBlessing){
  resultCard.style.display = "block";
  resultKicker.textContent = isBlessing ? "BLESSING ✨" : "YOU WON 🎉";
  resultTitle.textContent = title;
  resultNote.textContent = note || "";
}

/** =========================
 *  EVENTS
 *  ========================= */
function hookUnlockOnFollow(btnId){
  const el = qs(btnId);
  el.addEventListener("click", () => {
    // user intent: follow => unlock immediately (even if they don't actually follow)
    // this is intentional for on-site UX
    setUnlocked(true);
  }, { passive: true });
}

async function init(){
  // reset helper: add ?reset=1 to URL when you test
  const u = new URL(location.href);
  if (u.searchParams.get("reset") === "1"){
    localStorage.removeItem(KEY_UNLOCKED);
    localStorage.removeItem(KEY_PLAYED);
  }

  hookUnlockOnFollow("#btnIG");
  hookUnlockOnFollow("#btnFB");
  hookUnlockOnFollow("#btnTT");

  renderLock();
  renderPlayed();

  // Load data
  try{
    await loadAll();
  }catch(e){
    // even if data fails, keep a minimal fallback so the page works
    pool = [
      { prize:"Blessing", weight: 1, remaining_auto: 999999, type:"blessing", active_auto:true }
    ];
    blessings = [{ blessing:"Good luck is coming your way :)", weight:1, active:true }];
  }

  spinBtn.addEventListener("click", () => {
    if (spinBtn.disabled) return;
    if (!getUnlocked() || getPlayed()) return;

    // pick from pool
    const pick = pickWeighted(pool, "weight");
    if (!pick){
      showResult("Blessing ✨", pickWeighted(blessings,"weight").blessing, true);
      setPlayed(true);
      return;
    }

    if ((pick.type || "").toLowerCase() === "blessing" || pick.prize.toLowerCase() === "blessing"){
      const b = pickWeighted(blessings, "weight");
      showResult(b ? b.blessing : "Good luck is coming your way :)", "", true);
    }else{
      showResult(pick.prize, "Show this screen to our staff to claim.", false);
    }

    setPlayed(true);
  });
}

init();
</script>
</body>
</html>
