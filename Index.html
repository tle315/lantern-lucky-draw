<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PandaGoldenEar Lucky Draw</title>

<style>
:root{
  --bg:#fbf6ef;
  --card:#fffaf2;
  --ink:#171717;
  --muted:#6b625a;
  --brand:#8f3a2e;
  --line:rgba(0,0,0,.1);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:radial-gradient(1200px 800px at 50% 0%,#fff,var(--bg));
  color:var(--ink);
}

.wrap{max-width:900px;margin:auto;padding:24px}
.panel{
  background:rgba(255,255,255,.8);
  border-radius:36px;
  padding:24px;
  box-shadow:0 20px 60px rgba(0,0,0,.08);
}

.badge{
  display:inline-block;
  padding:8px 18px;
  border-radius:999px;
  background:#f2e6d6;
  font-weight:700;
  margin:auto;
}

.hero{text-align:center;margin-top:10px}
.fu{
  width:60px;height:60px;
  border-radius:18px;
  background:linear-gradient(#b94a3a,#7c2e26);
  display:grid;place-items:center;
  color:#f6d27a;
  font-weight:900;font-size:32px;
  margin:auto;
}
h1{
  font-size:clamp(30px,6vw,56px);
  margin:12px 0 4px;
  line-height:1.05;
}
.sub{
  font-size:18px;
  color:var(--muted);
  font-weight:600;
}

.note{
  margin:18px auto;
  padding:16px;
  border-radius:22px;
  border:1px dashed rgba(143,58,46,.3);
  text-align:center;
  font-weight:700;
  color:#6a4b2f;
}
.pill{
  display:inline-block;
  padding:6px 14px;
  border-radius:999px;
  border:1px solid rgba(0,0,0,.1);
  background:white;
  margin:6px;
}

.wheel-area{
  display:flex;
  justify-content:center;
  margin-top:10px;
}

.wheel-wrap{
  position:relative;
  width:min(420px,85vw);
  aspect-ratio:1;
  border-radius:50%;
  background:white;
  box-shadow:0 20px 60px rgba(0,0,0,.1);
  overflow:hidden;
}

canvas{width:100%;height:100%}

.pointer{
  position:absolute;
  top:-8px;
  left:50%;
  transform:translateX(-50%);
  width:0;height:0;
  border-left:14px solid transparent;
  border-right:14px solid transparent;
  border-bottom:22px solid var(--brand);
}

.center-btn{
  position:absolute;
  inset:50% auto auto 50%;
  transform:translate(-50%,-50%);
  width:44%;
  aspect-ratio:1;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.8),rgba(202,165,143,.9));
  display:grid;
  place-items:center;
  cursor:pointer;
  box-shadow:0 18px 55px rgba(143,58,46,.2);
  border:1px solid rgba(255,255,255,.6);
}

.center-btn:active{
  transform:translate(-50%,-50%) scale(.97);
}

.center-btn span{
  font-size:clamp(18px,4vw,28px);
  font-weight:1000;
  color:white;
  letter-spacing:.1em;
}

.tap-hint{
  text-align:center;
  margin-top:8px;
  color:rgba(0,0,0,.4);
  font-weight:700;
}

.result{
  margin-top:18px;
  padding:18px;
  border-radius:22px;
  background:rgba(255,250,242,.9);
  border:1px solid var(--line);
  text-align:center;
  display:none;
}

.result h2{
  font-size:28px;
  margin:10px 0;
  color:var(--brand);
}

.footer{
  margin-top:18px;
  text-align:center;
  font-weight:800;
  color:rgba(0,0,0,.45);
}
</style>
</head>

<body>
<div class="wrap">
<div class="panel">

<div style="text-align:center">
<div class="badge">🏮 Lantern Festival Special</div>
</div>

<div class="hero">
<div class="fu">福</div>
<h1>PandaGoldenEar<br>Lucky Draw</h1>
<div class="sub">Tap <b>Spin</b> to reveal your surprise.</div>

<div class="note">
📸 Don’t forget to follow us —
<div>
<span class="pill">Instagram</span>
<span class="pill">Facebook</span>
<span class="pill">TikTok</span>
</div>
Follow any <b>ONE</b> platform to stay updated 😉
</div>
</div>

<div class="wheel-area">
<div class="wheel-wrap">
<div class="pointer"></div>
<canvas id="wheelCanvas" width="800" height="800"></canvas>
<div class="center-btn" id="spinBtn">
<span>SPIN</span>
</div>
</div>
</div>

<div class="tap-hint">Tap the wheel to spin</div>

<div class="result" id="resultCard">
<div id="resultText"></div>
</div>

<div class="footer">
Thanks! One play per device.<br>
See you at our dumpling food truck!
</div>

</div>
</div>

<script>
const prizes=[
"Blessing",
"This is on us",
"50% off for you",
"2 more Dumplings",
"One More Drink"
];

const canvas=document.getElementById("wheelCanvas");
const ctx=canvas.getContext("2d");
const spinBtn=document.getElementById("spinBtn");
const resultCard=document.getElementById("resultCard");
const resultText=document.getElementById("resultText");

let angle=0;
let spinning=false;

function drawWheel(){
const arc=2*Math.PI/prizes.length;
for(let i=0;i<prizes.length;i++){
ctx.beginPath();
ctx.moveTo(400,400);
ctx.fillStyle=i%2?"#efe4d6":"#dcdcdc";
ctx.arc(400,400,400,i*arc,(i+1)*arc);
ctx.fill();
ctx.save();
ctx.translate(400,400);
ctx.rotate(i*arc+arc/2);
ctx.fillStyle="#5a4637";
ctx.font="bold 20px sans-serif";
ctx.textAlign="right";
ctx.fillText(prizes[i],350,10);
ctx.restore();
}
}
drawWheel();

spinBtn.onclick=function(){
if(spinning)return;
spinning=true;
const random=Math.floor(Math.random()*prizes.length);
const arc=360/prizes.length;
const finalAngle=360*6+(360-(random*arc+arc/2));
canvas.style.transition="transform 4s cubic-bezier(.17,.67,.25,1)";
canvas.style.transform=`rotate(${finalAngle}deg)`;

setTimeout(()=>{
resultCard.style.display="block";
resultText.innerHTML="<h2>"+prizes[random]+"</h2>";
spinning=false;
},4200);
}
</script>

</body>
</html>
